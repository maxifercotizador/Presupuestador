<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1e3a8a">
<title>MAXIFER - Consultor de Precios</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#f1f5f9;color:#0f172a;font-size:15px;display:flex;flex-direction:column;height:100vh;height:100dvh}

.header{background:linear-gradient(135deg,#1e3a8a,#3b82f6);color:#fff;padding:10px 14px;box-shadow:0 2px 8px rgba(0,0,0,.15);flex-shrink:0}
.header h1{font-size:16px;font-weight:700;letter-spacing:.3px}
.header .sub{font-size:11px;opacity:.85;margin-top:1px}

.controls{background:#fff;padding:10px;border-bottom:1px solid #e2e8f0;flex-shrink:0}

.search-wrap{position:relative;margin-bottom:8px}
.search-input{width:100%;padding:11px 38px 11px 38px;border:2px solid #cbd5e1;border-radius:10px;font-size:15px;background:#f8fafc;outline:none;transition:border-color .15s}
.search-input:focus{border-color:#3b82f6;background:#fff}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:#64748b;font-size:16px;pointer-events:none}
.clear-btn{position:absolute;right:8px;top:50%;transform:translateY(-50%);width:26px;height:26px;border:none;background:#e2e8f0;color:#475569;border-radius:50%;font-size:14px;cursor:pointer;display:none;align-items:center;justify-content:center;font-weight:700}
.clear-btn.visible{display:flex}

.suggestions{position:absolute;top:100%;left:0;right:0;background:#fff;border:1px solid #cbd5e1;border-top:none;border-radius:0 0 10px 10px;max-height:320px;overflow-y:auto;z-index:100;box-shadow:0 6px 18px rgba(0,0,0,.12);display:none}
.suggestions.visible{display:block}
.sug-header{padding:7px 12px;background:#eff6ff;color:#1e40af;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.3px;border-bottom:1px solid #dbeafe;position:sticky;top:0;z-index:1}
.sug-item{padding:10px 12px;border-bottom:1px solid #f1f5f9;cursor:pointer;font-size:13px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.sug-item.sug-fam{background:#fafbfc}
.sug-item:last-child{border-bottom:none}
.sug-item:active,.sug-item.hover{background:#eff6ff}
.sug-count{margin-left:auto;background:#1e3a8a;color:#fff;font-size:11px;font-weight:800;padding:3px 9px;border-radius:10px;min-width:28px;text-align:center}
.sug-tag{display:inline-block;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:700;flex-shrink:0}
.tag-prod{background:#dbeafe;color:#1e40af}
.tag-num{background:#fef3c7;color:#92400e}
.tag-desc{background:#dcfce7;color:#166534}
.sug-text{color:#0f172a;flex:1;min-width:0;word-break:break-word}
.sug-meta{font-size:11px;color:#64748b;width:100%;margin-top:2px;padding-left:0}
mark{background:#fef08a;color:inherit;padding:0 1px;border-radius:2px}

.filter-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:8px}
.filter-grid input{padding:8px 10px;border:1px solid #cbd5e1;border-radius:8px;font-size:13px;background:#f8fafc;outline:none;min-width:0}
.filter-grid input:focus{border-color:#3b82f6;background:#fff}

.disc-row{display:flex;align-items:center;gap:8px;padding:8px 10px;background:#fef3c7;border-radius:8px;border:1px solid #fde68a}
.disc-row label{font-size:12px;font-weight:700;color:#92400e;white-space:nowrap}
.disc-row input{width:60px;padding:5px 6px;border:1px solid #fbbf24;border-radius:5px;font-size:14px;text-align:center;font-weight:700;color:#78350f;background:#fff;outline:none}
.disc-row input:focus{border-color:#f59e0b}
.disc-row .pct{font-weight:700;color:#92400e;font-size:14px;margin-left:-4px}
.disc-presets{display:flex;gap:4px;margin-left:auto}
.preset-btn{padding:5px 9px;background:#fff;border:1px solid #fbbf24;color:#92400e;border-radius:5px;font-size:11px;font-weight:700;cursor:pointer}
.preset-btn:active{background:#fbbf24;color:#fff}
.preset-btn.active{background:#f59e0b;color:#fff;border-color:#f59e0b}

.family-bar{background:#fff;padding:8px 10px;border-bottom:1px solid #e2e8f0;overflow-x:auto;white-space:nowrap;flex-shrink:0;-webkit-overflow-scrolling:touch}
.family-bar::-webkit-scrollbar{height:3px}
.family-bar::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:3px}
.fam-chip{display:inline-block;padding:6px 12px;margin-right:5px;background:#f1f5f9;color:#475569;border:1px solid #e2e8f0;border-radius:16px;font-size:12px;font-weight:600;cursor:pointer;user-select:none}
.fam-chip.active{background:#1e3a8a;color:#fff;border-color:#1e3a8a}

.results-info{padding:6px 12px;background:#e0f2fe;color:#075985;font-size:12px;font-weight:600;border-bottom:1px solid #bae6fd;flex-shrink:0;display:flex;justify-content:space-between;align-items:center}

.results{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:8px;background:#f1f5f9}

.product-card{background:#fff;border-radius:10px;padding:10px 12px;margin-bottom:6px;box-shadow:0 1px 3px rgba(0,0,0,.05);border-left:3px solid #3b82f6}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:5px}
.card-num{font-size:11px;color:#64748b;font-weight:600}
.card-num strong{color:#1e3a8a;font-size:13px;font-weight:800}
.card-fam{font-size:10px;font-weight:700;color:#1e40af;background:#dbeafe;padding:2px 7px;border-radius:10px;white-space:nowrap}
.card-desc{font-size:14px;color:#0f172a;line-height:1.35;margin-bottom:8px;font-weight:500}
.card-prices{display:flex;justify-content:space-between;align-items:center;padding-top:7px;border-top:1px dashed #e2e8f0}
.price-block{display:flex;flex-direction:column}
.price-label{font-size:10px;color:#64748b;text-transform:uppercase;font-weight:600;letter-spacing:.3px}
.price-lista{font-size:14px;color:#475569;font-weight:600;text-decoration:line-through;text-decoration-color:#cbd5e1}
.price-neto{font-size:18px;color:#059669;font-weight:800}
.price-neto.no-disc{color:#0f172a}

.empty{text-align:center;padding:40px 20px;color:#64748b}
.empty-icon{font-size:42px;margin-bottom:10px;opacity:.5}
.empty-title{font-size:15px;font-weight:700;margin-bottom:5px;color:#334155}
.empty-sub{font-size:13px}

.load-more{text-align:center;padding:12px;color:#64748b;font-size:12px;font-weight:600}

/* iOS safe area */
@supports(padding:max(0px)){
  .header{padding-top:max(10px,env(safe-area-inset-top))}
  .results{padding-bottom:max(8px,env(safe-area-inset-bottom))}
}
</style>
</head>
<body>

<div class="header">
  <h1>🔧 MAXIFER - Consultor de Precios</h1>
  <div class="sub">Consulta rápida de lista de precios</div>
</div>

<div class="controls">
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" class="search-input" id="searchGeneral" placeholder="Buscar por producto, número o descripción..." autocomplete="off" spellcheck="false">
    <button class="clear-btn" id="clearGeneral">✕</button>
    <div class="suggestions" id="suggestions"></div>
  </div>

  <div class="filter-grid">
    <input type="text" id="filterNumero" placeholder="Nº código..." autocomplete="off" inputmode="text">
    <input type="text" id="filterDesc" placeholder="Descripción..." autocomplete="off">
  </div>

  <div class="disc-row">
    <label>Desc.</label>
    <input type="number" id="discount" value="0" min="0" max="99" step="1" inputmode="numeric">
    <span class="pct">%</span>
    <div class="disc-presets">
      <button class="preset-btn" data-d="0">0</button>
      <button class="preset-btn" data-d="42">42</button>
      <button class="preset-btn" data-d="46">46</button>
      <button class="preset-btn" data-d="50">50</button>
    </div>
  </div>
</div>

<div class="family-bar" id="familyBar"></div>

<div class="results-info">
  <span id="resultsCount">Cargando...</span>
  <span id="discInfo"></span>
</div>

<div class="results" id="results"></div>

// Normalización sin acentos
const norm = s => (s||'').toString().toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'');

// Pre-computar campos normalizados
DATA.forEach(it => {
  it._p = norm(it.p);
  it._n = norm(it.n);
  it._d = norm(it.d);
  it._all = it._p + ' ' + it._n + ' ' + it._d;
});

const families = [...new Set(DATA.map(d=>d.p))].sort();

const fmtMoney = v => '$' + v.toLocaleString('es-AR', {minimumFractionDigits:2, maximumFractionDigits:2});

// Estado
let state = {
  q: '',
  numero: '',
  desc: '',
  family: null,
  discount: 0,
  renderLimit: 50
};

const $ = id => document.getElementById(id);

// Highlight
function highlight(text, terms){
  if(!terms.length) return text;
  const nText = norm(text);
  const ranges = [];
  terms.forEach(t => {
    if(!t) return;
    let idx = 0;
    while((idx = nText.indexOf(t, idx)) !== -1){
      ranges.push([idx, idx+t.length]);
      idx += t.length;
    }
  });
  if(!ranges.length) return escapeHtml(text);
  ranges.sort((a,b)=>a[0]-b[0]);
  const merged = [ranges[0]];
  for(let i=1;i<ranges.length;i++){
    const last = merged[merged.length-1];
    if(ranges[i][0] <= last[1]) last[1] = Math.max(last[1], ranges[i][1]);
    else merged.push(ranges[i]);
  }
  let out = '', pos = 0;
  merged.forEach(([s,e])=>{
    out += escapeHtml(text.slice(pos,s));
    out += '<mark>' + escapeHtml(text.slice(s,e)) + '</mark>';
    pos = e;
  });
  out += escapeHtml(text.slice(pos));
  return out;
}

function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

// Familias (chips)
function renderFamilies(){
  const bar = $('familyBar');
  let html = '<span class="fam-chip' + (state.family===null?' active':'') + '" data-f="__all__">Todas (' + DATA.length + ')</span>';
  // Contar por familia tras filtros q/numero/desc (sin family)
  const base = filterBase(false);
  const counts = {};
  base.forEach(it => { counts[it.p] = (counts[it.p]||0)+1; });
  families.forEach(f => {
    const c = counts[f] || 0;
    if(c === 0 && state.family !== f) return;
    html += '<span class="fam-chip' + (state.family===f?' active':'') + '" data-f="' + escapeHtml(f) + '">' + escapeHtml(f) + ' (' + c + ')</span>';
  });
  bar.innerHTML = html;
  bar.querySelectorAll('.fam-chip').forEach(el => {
    el.addEventListener('click', () => {
      const f = el.dataset.f;
      state.family = (f === '__all__') ? null : f;
      state.renderLimit = 50;
      render();
    });
  });
}

// Filtrado
function filterBase(applyFamily){
  const qTerms = norm(state.q).split(/\s+/).filter(Boolean);
  const nTerm = norm(state.numero);
  const dTerms = norm(state.desc).split(/\s+/).filter(Boolean);
  return DATA.filter(it => {
    if(qTerms.length && !qTerms.every(t => it._all.includes(t))) return false;
    if(nTerm && !it._n.includes(nTerm)) return false;
    if(dTerms.length && !dTerms.every(t => it._d.includes(t))) return false;
    if(applyFamily && state.family && it.p !== state.family) return false;
    return true;
  });
}

// Render principal
function render(){
  const filtered = filterBase(true);
  const total = filtered.length;
  const disc = state.discount;

  $('resultsCount').textContent = total === DATA.length
    ? total + ' productos'
    : total + ' de ' + DATA.length + ' productos';
  $('discInfo').textContent = disc > 0 ? ('Desc. ' + disc + '%') : '';

  renderFamilies();

  const res = $('results');
  if(total === 0){
    res.innerHTML = '<div class="empty"><div class="empty-icon">🔍</div><div class="empty-title">Sin resultados</div><div class="empty-sub">Probá con otros términos o limpiá los filtros</div></div>';
    return;
  }

  const qTerms = [norm(state.q), norm(state.numero), norm(state.desc)].join(' ').split(/\s+/).filter(Boolean);
  const slice = filtered.slice(0, state.renderLimit);
  const mult = (100 - disc) / 100;

  let html = '';
  slice.forEach(it => {
    const neto = it.pr * mult;
    html += '<div class="product-card">'
      + '<div class="card-top">'
      +   '<div class="card-num">Nº <strong>' + highlight(it.n, qTerms) + '</strong></div>'
      +   '<div class="card-fam">' + escapeHtml(it.p) + '</div>'
      + '</div>'
      + '<div class="card-desc">' + highlight(it.d, qTerms) + '</div>'
      + '<div class="card-prices">'
      +   '<div class="price-block"><span class="price-label">Lista</span>'
      +     '<span class="price-' + (disc>0?'lista':'neto no-disc') + '">' + fmtMoney(it.pr) + '</span>'
      +   '</div>';
    if(disc > 0){
      html += '<div class="price-block" style="align-items:flex-end"><span class="price-label">Neto (-' + disc + '%)</span>'
        + '<span class="price-neto">' + fmtMoney(neto) + '</span></div>';
    }
    html += '</div></div>';
  });

  if(total > state.renderLimit){
    html += '<div class="load-more">Mostrando ' + state.renderLimit + ' de ' + total + '. Tocá para ver más.</div>';
  }
  res.innerHTML = html;

  // Load more al tocar
  const lm = res.querySelector('.load-more');
  if(lm){
    lm.addEventListener('click', () => {
      state.renderLimit += 50;
      render();
    });
  }
}

// Sugerencias predictivas (general)
function renderSuggestions(){
  const box = $('suggestions');
  const q = state.q.trim();
  if(q.length < 2){ box.classList.remove('visible'); box.innerHTML=''; return; }
  const nq = norm(q);
  const qTerms = nq.split(/\s+/).filter(Boolean);

  // 1) Familias que matchean por su propio nombre (ej. "manguera" → CONECTORES PLASTICOS MANGUERAS)
  const famByName = [];
  families.forEach(f => {
    if(qTerms.every(t => norm(f).includes(t))) famByName.push(f);
  });

  // 2) Ítems directos — clasificados por relevancia
  //    A: número exacto
  //    B: número empieza con la query
  //    C: descripción empieza con la query (alguno de los términos)
  //    D: descripción contiene todos los términos
  const A = [], B = [], C = [], D = [];
  let totalMatches = 0;

  for(const it of DATA){
    const matchesAll = qTerms.every(t => it._all.includes(t));
    if(!matchesAll) continue;
    totalMatches++;

    if(it._n === nq){ A.push(it); continue; }
    if(/^\d/.test(nq) && it._n.startsWith(nq)){ B.push(it); continue; }

    // ¿Alguna palabra de la descripción empieza con el primer término?
    const firstTerm = qTerms[0];
    const descWords = it._d.split(/\s+/);
    if(descWords.some(w => w.startsWith(firstTerm))){ C.push(it); continue; }
    D.push(it);
  }

  // Limite total de ítems en dropdown: 40 (suficiente para ver variedad sin saturar)
  const ITEM_LIMIT = 40;
  const ordered = [...A, ...B, ...C, ...D].slice(0, ITEM_LIMIT);

  let html = '';

  // Header con total real
  if(totalMatches > 0){
    const extra = totalMatches > ITEM_LIMIT ? ' (mostrando primeros ' + ITEM_LIMIT + ')' : '';
    html += '<div class="sug-header">' + totalMatches + ' resultado' + (totalMatches!==1?'s':'') + extra + '</div>';
  }

  // Familias que matchean por nombre — como chip clickeable arriba
  famByName.forEach(f => {
    html += '<div class="sug-item sug-fam" data-type="fam" data-val="' + escapeHtml(f) + '">'
      + '<span class="sug-tag tag-prod">PRODUCTO</span>'
      + '<span class="sug-text">' + highlight(f, qTerms) + '</span>'
      + '</div>';
  });

  // Ítems directos
  ordered.forEach(it => {
    html += '<div class="sug-item" data-type="item" data-val="' + escapeHtml(it.n) + '" data-desc="' + escapeHtml(it.d) + '">'
      + '<span class="sug-tag tag-num">Nº ' + escapeHtml(it.n) + '</span>'
      + '<span class="sug-text">' + highlight(it.d, qTerms) + '</span>'
      + '<div class="sug-meta">' + escapeHtml(it.p) + ' · ' + fmtMoney(it.pr) + '</div></div>';
  });

  if(!html){ box.classList.remove('visible'); box.innerHTML=''; return; }
  box.innerHTML = html;
  box.classList.add('visible');
  box.querySelectorAll('.sug-item').forEach(el => {
    el.addEventListener('mousedown', e => e.preventDefault());
    el.addEventListener('click', () => {
      const t = el.dataset.type, v = el.dataset.val;
      if(t === 'fam'){
        // Click en familia: filtra por familia, limpia búsqueda
        state.family = v;
        state.q = '';
        state.numero = '';
        state.desc = '';
        $('searchGeneral').value = '';
        $('filterNumero').value = '';
        $('filterDesc').value = '';
      } else if(t === 'item'){
        // Click en ítem directo: busca por descripción exacta (única)
        // Usa el campo descripción para aislar el producto
        const desc = el.dataset.desc;
        state.q = '';
        state.desc = desc;
        state.numero = v;
        state.family = null;
        $('searchGeneral').value = '';
        $('filterDesc').value = desc;
        $('filterNumero').value = v;
      }
      box.classList.remove('visible');
      state.renderLimit = 50;
      render();
      updateClearBtn();
    });
  });
}

function updateClearBtn(){
  $('clearGeneral').classList.toggle('visible', state.q.length > 0);
}

// Debounce
let tmr;
function debounced(fn, ms=80){
  return (...args) => {
    clearTimeout(tmr);
    tmr = setTimeout(() => fn(...args), ms);
  };
}

// Event listeners
$('searchGeneral').addEventListener('input', e => {
  state.q = e.target.value;
  state.renderLimit = 50;
  updateClearBtn();
  renderSuggestions();
  debounced(render)();
});
$('searchGeneral').addEventListener('focus', () => renderSuggestions());
$('searchGeneral').addEventListener('blur', () => {
  setTimeout(() => $('suggestions').classList.remove('visible'), 150);
});
$('clearGeneral').addEventListener('click', () => {
  state.q = '';
  $('searchGeneral').value = '';
  updateClearBtn();
  $('suggestions').classList.remove('visible');
  state.renderLimit = 50;
  render();
  $('searchGeneral').focus();
});

$('filterNumero').addEventListener('input', e => {
  state.numero = e.target.value;
  state.renderLimit = 50;
  debounced(render)();
});
$('filterDesc').addEventListener('input', e => {
  state.desc = e.target.value;
  state.renderLimit = 50;
  debounced(render)();
});

$('discount').addEventListener('input', e => {
  let v = parseFloat(e.target.value) || 0;
  if(v < 0) v = 0;
  if(v > 99) v = 99;
  state.discount = v;
  document.querySelectorAll('.preset-btn').forEach(b => {
    b.classList.toggle('active', parseFloat(b.dataset.d) === v);
  });
  render();
});

document.querySelectorAll('.preset-btn').forEach(b => {
  b.addEventListener('click', () => {
    const v = parseFloat(b.dataset.d);
    state.discount = v;
    $('discount').value = v;
    document.querySelectorAll('.preset-btn').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    render();
  });
});

// Init
render();
</script>
