<style>
:root {
    /* Paleta MAXIFER */
    --navy: #1e2c5b;
    --navy-dark: #131e42;
    --navy-light: #2a3d75;
    --green: #4ea83e;
    --green-dark: #3d8a30;
    --green-light: #6bc35a;
    --red: #c8102e;
    --red-dark: #a00d24;

    /* Neutros */
    --bg: #f5f7fb;
    --bg-soft: #eef1f7;
    --bg-card: #ffffff;
    --border: #dde3ee;
    --border-strong: #c5cee0;
    --text: #1a2238;
    --text-muted: #5a6685;
    --text-dim: #8a94ae;

    --shadow-sm: 0 1px 2px rgba(30,44,91,0.06), 0 1px 3px rgba(30,44,91,0.04);
    --shadow: 0 4px 12px rgba(30,44,91,0.08), 0 2px 4px rgba(30,44,91,0.05);
    --shadow-lg: 0 16px 36px -8px rgba(30,44,91,0.18), 0 8px 16px -4px rgba(30,44,91,0.1);
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

html, body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
    min-height: 100dvh;
}

body {
    background-image:
        radial-gradient(ellipse at top right, rgba(78,168,62,0.06), transparent 60%),
        radial-gradient(ellipse at bottom left, rgba(30,44,91,0.04), transparent 60%);
    background-attachment: fixed;
}

button, input { font-family: inherit; }
mark { background: rgba(78,168,62,0.25); color: var(--green-dark); padding: 0 2px; border-radius: 2px; font-weight: 700; }

/* TOP BAR */
.topbar {
    border-bottom: 1px solid var(--border);
    background: rgba(255,255,255,0.92);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    position: sticky;
    top: 0;
    z-index: 50;
    padding: 12px 20px;
    box-shadow: var(--shadow-sm);
}

.topbar-inner {
    max-width: 1400px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
}

.logo-btn {
    background: none;
    border: none;
    padding: 0;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 12px;
    transition: opacity 0.15s;
}

.logo-btn:hover { opacity: 0.8; }

.logo-img {
    width: 44px;
    height: 44px;
    object-fit: contain;
    flex-shrink: 0;
}

.logo-text {
    font-family: 'Montserrat', sans-serif;
    font-size: 11px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.12em;
    font-weight: 700;
    border-left: 1px solid var(--border-strong);
    padding-left: 12px;
    line-height: 1.2;
}

.contact-mini {
    display: flex;
    gap: 8px;
    font-size: 13px;
    color: var(--text-muted);
    align-items: center;
}

/* VIEWS */
.view { display: none; }
.view.active { display: block; }

/* HOME */
.home {
    max-width: 1100px;
    margin: 0 auto;
    padding: 60px 24px 80px;
    min-height: calc(100vh - 70px);
    min-height: calc(100dvh - 70px);
    display: flex;
    flex-direction: column;
    justify-content: center;
}

.home-hero {
    text-align: center;
    margin-bottom: 48px;
}

.home-pretitle {
    font-size: 12px;
    color: var(--green-dark);
    text-transform: uppercase;
    letter-spacing: 0.2em;
    font-weight: 700;
    margin-bottom: 16px;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 6px 14px;
    background: rgba(78,168,62,0.1);
    border-radius: 100px;
    border: 1px solid rgba(78,168,62,0.2);
}

.home-pretitle::before {
    content: '';
    width: 6px;
    height: 6px;
    background: var(--green);
    border-radius: 50%;
}

.home-title {
    font-family: 'Montserrat', sans-serif;
    font-weight: 900;
    font-size: clamp(38px, 7vw, 68px);
    line-height: 1;
    letter-spacing: -0.03em;
    margin-bottom: 18px;
    color: var(--navy);
}

.home-title .accent { color: var(--green); }
.home-title .accent-red { color: var(--red); }

.home-subtitle {
    font-size: clamp(15px, 2vw, 18px);
    color: var(--text-muted);
    max-width: 600px;
    margin: 0 auto;
    line-height: 1.5;
}

.home-cards {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 20px;
}

.home-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 36px 28px;
    cursor: pointer;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    display: flex;
    flex-direction: column;
    gap: 14px;
    position: relative;
    overflow: hidden;
    color: inherit;
    font-family: inherit;
    text-align: left;
    box-shadow: var(--shadow-sm);
}

.home-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 4px;
    background: linear-gradient(90deg, var(--green), var(--navy));
    transform: scaleX(0);
    transform-origin: left;
    transition: transform 0.3s;
}

.home-card.alt::before {
    background: linear-gradient(90deg, var(--navy), var(--red));
}

.home-card:hover {
    border-color: var(--navy);
    transform: translateY(-4px);
    box-shadow: var(--shadow-lg);
}

.home-card:hover::before { transform: scaleX(1); }

.home-card-icon {
    width: 56px;
    height: 56px;
    background: rgba(78,168,62,0.12);
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--green-dark);
    position: relative;
    z-index: 1;
}

.home-card.alt .home-card-icon {
    background: rgba(30,44,91,0.1);
    color: var(--navy);
}

.home-card-title {
    font-family: 'Montserrat', sans-serif;
    font-weight: 800;
    font-size: 22px;
    letter-spacing: -0.01em;
    line-height: 1.1;
    color: var(--navy);
    position: relative;
    z-index: 1;
}

.home-card-desc {
    font-size: 14px;
    color: var(--text-muted);
    line-height: 1.5;
    position: relative;
    z-index: 1;
}

.home-card-arrow {
    margin-top: auto;
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    font-weight: 700;
    color: var(--green-dark);
    position: relative;
    z-index: 1;
    text-transform: uppercase;
    letter-spacing: 0.05em;
}

.home-card.alt .home-card-arrow { color: var(--navy); }

.home-card:hover .home-card-arrow svg { transform: translateX(4px); }
.home-card-arrow svg { transition: transform 0.2s; }

/* CONSULTOR */
.consultor {
    max-width: 1400px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    height: calc(100vh - 70px);
    height: calc(100dvh - 70px);
}

.consultor-controls {
    padding: 16px 20px;
    background: var(--bg-card);
    border-bottom: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    gap: 10px;
    flex-shrink: 0;
    box-shadow: var(--shadow-sm);
}

.search-wrap {
    position: relative;
}

.search-input {
    width: 100%;
    padding: 13px 42px 13px 44px;
    border: 2px solid var(--border);
    border-radius: 10px;
    font-size: 15px;
    background: var(--bg-soft);
    color: var(--text);
    outline: none;
    transition: all 0.2s;
}

.search-input:focus {
    border-color: var(--green);
    background: white;
    box-shadow: 0 0 0 3px rgba(78,168,62,0.15);
}

.search-input::placeholder { color: var(--text-dim); }

.search-icon {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-muted);
    pointer-events: none;
}

.clear-btn {
    position: absolute;
    right: 10px;
    top: 50%;
    transform: translateY(-50%);
    width: 26px;
    height: 26px;
    border: none;
    background: var(--border-strong);
    color: white;
    border-radius: 50%;
    font-size: 14px;
    cursor: pointer;
    display: none;
    align-items: center;
    justify-content: center;
    font-weight: 700;
}

.clear-btn.visible { display: flex; }
.clear-btn:hover { background: var(--red); }

.suggestions {
    position: absolute;
    top: 100%;
    left: 0;
    right: 0;
    background: var(--bg-card);
    border: 1px solid var(--border-strong);
    border-top: none;
    border-radius: 0 0 10px 10px;
    max-height: 360px;
    overflow-y: auto;
    z-index: 100;
    box-shadow: var(--shadow-lg);
    display: none;
    margin-top: -1px;
}

.suggestions.visible { display: block; }

.sug-header {
    padding: 8px 14px;
    background: var(--navy);
    color: white;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    position: sticky;
    top: 0;
    z-index: 1;
}

.sug-item {
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    font-size: 13px;
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
    transition: background 0.1s;
}

.sug-item:hover, .sug-item:active { background: var(--bg-soft); }
.sug-item:last-child { border-bottom: none; }

.sug-tag {
    display: inline-block;
    padding: 2px 7px;
    border-radius: 4px;
    font-size: 10px;
    font-weight: 700;
    flex-shrink: 0;
}

.tag-prod { background: rgba(78,168,62,0.15); color: var(--green-dark); }
.tag-num { background: rgba(30,44,91,0.1); color: var(--navy); }

.sug-text { color: var(--text); flex: 1; min-width: 0; word-break: break-word; }
.sug-meta { font-size: 11px; color: var(--text-muted); width: 100%; margin-top: 3px; }

.filter-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
}

.filter-grid input {
    padding: 9px 12px;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 13px;
    background: var(--bg-soft);
    color: var(--text);
    outline: none;
    min-width: 0;
    transition: all 0.15s;
}

.filter-grid input:focus { border-color: var(--green); background: white; }
.filter-grid input::placeholder { color: var(--text-dim); }

.disc-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 14px;
    background: linear-gradient(135deg, rgba(78,168,62,0.08), rgba(78,168,62,0.04));
    border-radius: 10px;
    border: 1px solid rgba(78,168,62,0.2);
}

.disc-row label {
    font-size: 12px;
    font-weight: 700;
    color: var(--green-dark);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    white-space: nowrap;
}

.disc-row input {
    width: 70px;
    padding: 7px 8px;
    border: 1px solid var(--green);
    border-radius: 6px;
    font-size: 16px;
    text-align: center;
    font-weight: 800;
    color: var(--green-dark);
    background: white;
    outline: none;
    transition: all 0.15s;
}

.disc-row input:focus {
    box-shadow: 0 0 0 3px rgba(78,168,62,0.2);
}

.disc-row .pct {
    font-weight: 800;
    color: var(--green-dark);
    font-size: 16px;
    margin-left: -6px;
}

.disc-row .disc-hint {
    font-size: 11px;
    color: var(--text-muted);
    margin-left: auto;
    text-align: right;
    line-height: 1.3;
    font-weight: 500;
}

.family-bar {
    background: var(--bg-card);
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
    white-space: nowrap;
    flex-shrink: 0;
    -webkit-overflow-scrolling: touch;
}

.family-bar::-webkit-scrollbar { height: 4px; }
.family-bar::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 4px; }

.fam-chip {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 7px 13px;
    margin-right: 6px;
    background: var(--bg-soft);
    color: var(--text-muted);
    border: 1px solid var(--border);
    border-radius: 100px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    user-select: none;
    transition: all 0.15s;
}

.fam-chip:hover { border-color: var(--navy); color: var(--navy); }
.fam-chip.active {
    background: var(--navy);
    color: white;
    border-color: var(--navy);
}

.fam-chip .pdf-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--red);
    display: inline-block;
}

.fam-chip.active .pdf-dot { background: white; }

.results-info {
    padding: 8px 16px;
    background: var(--bg-soft);
    color: var(--text-muted);
    font-size: 12px;
    font-weight: 600;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
    text-transform: uppercase;
    letter-spacing: 0.05em;
}

.results-info .disc-info {
    color: var(--green-dark);
    font-weight: 700;
}

.results {
    flex: 1;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    padding: 12px;
}

.product-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-left: 3px solid var(--navy);
    border-radius: 10px;
    padding: 14px 16px;
    margin-bottom: 8px;
    transition: all 0.15s;
    box-shadow: var(--shadow-sm);
}

.product-card:hover {
    border-left-color: var(--green);
    box-shadow: var(--shadow);
}

.card-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 10px;
    margin-bottom: 6px;
}

.card-num {
    font-size: 11px;
    color: var(--text-muted);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
}

.card-num strong {
    color: var(--navy);
    font-size: 14px;
    font-weight: 800;
}

.card-fam {
    font-size: 10px;
    font-weight: 700;
    color: var(--navy);
    background: rgba(30,44,91,0.08);
    padding: 4px 10px;
    border-radius: 100px;
    white-space: nowrap;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    cursor: pointer;
    transition: all 0.15s;
    border: 1px solid transparent;
    display: inline-flex;
    align-items: center;
    gap: 5px;
}

.card-fam.has-pdf { border-color: var(--red); }

.card-fam:hover {
    background: var(--navy);
    color: white;
}

.card-fam.has-pdf:hover {
    background: var(--red);
    border-color: var(--red);
}

.card-codigo {
    font-size: 11px;
    color: var(--text-muted);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin: 2px 0 8px;
    display: flex;
    align-items: center;
    gap: 6px;
    flex-wrap: wrap;
}

.card-codigo strong {
    color: var(--navy);
    font-weight: 800;
    font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
    font-size: 12px;
    background: rgba(30,44,91,0.07);
    padding: 2px 8px;
    border-radius: 5px;
    text-transform: none;
    letter-spacing: 0.2px;
}

.card-desc {
    font-size: 14px;
    color: var(--text);
    line-height: 1.4;
    margin-bottom: 10px;
    font-weight: 500;
}

.card-prices {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding-top: 10px;
    border-top: 1px dashed var(--border);
    gap: 10px;
}

.price-block {
    display: flex;
    flex-direction: column;
    gap: 2px;
}

.price-label {
    font-size: 10px;
    color: var(--text-muted);
    text-transform: uppercase;
    font-weight: 600;
    letter-spacing: 0.08em;
}

.price-lista {
    font-size: 14px;
    color: var(--text-muted);
    font-weight: 600;
    text-decoration: line-through;
    text-decoration-color: var(--text-dim);
}

.price-neto {
    font-size: 19px;
    color: var(--green-dark);
    font-weight: 800;
    font-variant-numeric: tabular-nums;
    letter-spacing: -0.01em;
}

.price-neto.no-disc { color: var(--navy); }

.card-actions {
    display: flex;
    gap: 6px;
}

.card-action-btn {
    background: var(--bg-soft);
    border: 1px solid var(--border);
    color: var(--navy);
    height: 36px;
    padding: 0 12px;
    border-radius: 8px;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 7px;
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    transition: all 0.15s;
    white-space: nowrap;
}

.card-action-btn svg { flex-shrink: 0; }

.card-action-btn:hover {
    border-color: var(--red);
    color: var(--red);
    background: rgba(200,16,46,0.05);
}

.empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-muted);
}

.empty-icon { font-size: 42px; margin-bottom: 12px; opacity: 0.4; }
.empty-title { font-size: 16px; font-weight: 700; margin-bottom: 6px; color: var(--navy); }
.empty-sub { font-size: 13px; }

.load-more {
    text-align: center;
    padding: 14px;
    color: var(--navy);
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    cursor: pointer;
    background: var(--bg-soft);
    border-radius: 10px;
    border: 1px dashed var(--border-strong);
    transition: all 0.15s;
}

.load-more:hover { background: var(--navy); color: white; border-color: var(--navy); }

/* LISTAS */
.listas {
    max-width: 1400px;
    margin: 0 auto;
    padding: 24px 20px 60px;
}

.listas-header {
    margin-bottom: 24px;
    display: flex;
    flex-direction: column;
    gap: 16px;
}

.listas-title-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
}

.listas-title {
    font-family: 'Montserrat', sans-serif;
    font-weight: 900;
    font-size: 30px;
    letter-spacing: -0.02em;
    line-height: 1;
    color: var(--navy);
}

.listas-subtitle {
    font-size: 12px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-top: 6px;
    font-weight: 600;
}

.listas-search {
    position: relative;
    max-width: 360px;
    flex: 1;
    min-width: 200px;
}

.listas-search input {
    width: 100%;
    padding: 10px 14px 10px 38px;
    border: 1px solid var(--border);
    border-radius: 10px;
    font-size: 14px;
    background: var(--bg-card);
    color: var(--text);
    outline: none;
    transition: all 0.15s;
}

.listas-search input:focus {
    border-color: var(--green);
    box-shadow: 0 0 0 3px rgba(78,168,62,0.15);
}

.listas-search input::placeholder { color: var(--text-dim); }

.listas-search-icon {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-muted);
    pointer-events: none;
}

.listas-count {
    font-size: 12px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;

<script id="maxifer-back-handler">
// Maxifer: el boton "atras" del browser cierra modales en lugar de salir de la app.
(function(){
  function findOpenModal(){
    var sels = [".modal-overlay.active",".modal.active",".modal-bg.active",".lightbox.active","[class*=modal-overlay].active","[class*=lightbox].active","[role=dialog]:not([hidden])"];
    for (var i=0;i<sels.length;i++){
      var els = document.querySelectorAll(sels[i]);
      for (var j=0;j<els.length;j++){
        var cs = getComputedStyle(els[j]);
        if (cs.display !== "none" && cs.visibility !== "hidden" && cs.opacity !== "0") return els[j];
      }
    }
    return null;
  }
  if (history.state && history.state.maxiferBack) return;
  history.replaceState({maxiferBack:1, base:1}, "");
  var seen = false;
  var obs = new MutationObserver(function(){
    var m = findOpenModal();
    if (m && !seen) {
      history.pushState({maxiferBack:1, modal:1}, "");
      seen = true;
    } else if (!m && seen) {
      seen = false;
    }
  });
  obs.observe(document.body, {attributes:true, attributeFilter:["class","style"], subtree:true});
  window.addEventListener("popstate", function(){
    var m = findOpenModal();
    if (m) {
      // Esc cierra la mayoria de los modales
      document.dispatchEvent(new KeyboardEvent("keydown",{key:"Escape",code:"Escape",keyCode:27,which:27,bubbles:true,cancelable:true}));
      // Si Esc no cerro, removemos active y/o ocultamos
      setTimeout(function(){
        var still = findOpenModal();
        if (still) {
          still.classList.remove("active");
          if (still.style.display === "block" || still.style.display === "flex") still.style.display = "none";
        }
        // Re-push para que el siguiente back tambien cierre modales nuevos
        if (findOpenModal()) history.pushState({maxiferBack:1, modal:1}, "");
      }, 30);
      seen = false;
    }
  });
})();
</script>
