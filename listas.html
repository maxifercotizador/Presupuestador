<style>
:root {
    /* Paleta MAXIFER */
    --navy: #1e2c5b;
    --navy-dark: #131e42;
    --navy-light: #2a3d75;
    --green: #4ea83e;
    --green-dark: #3d8a30;
    --green-light: #6bc35a;
    --red: #c8102e;
    --red-dark: #a00d24;

    /* Neutros */
    --bg: #f5f7fb;
    --bg-soft: #eef1f7;
    --bg-card: #ffffff;
    --border: #dde3ee;
    --border-strong: #c5cee0;
    --text: #1a2238;
    --text-muted: #5a6685;
    --text-dim: #8a94ae;

    --shadow-sm: 0 1px 2px rgba(30,44,91,0.06), 0 1px 3px rgba(30,44,91,0.04);
    --shadow: 0 4px 12px rgba(30,44,91,0.08), 0 2px 4px rgba(30,44,91,0.05);
    --shadow-lg: 0 16px 36px -8px rgba(30,44,91,0.18), 0 8px 16px -4px rgba(30,44,91,0.1);
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

html, body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
    min-height: 100dvh;
}

body {
    background-image:
        radial-gradient(ellipse at top right, rgba(78,168,62,0.06), transparent 60%),
        radial-gradient(ellipse at bottom left, rgba(30,44,91,0.04), transparent 60%);
    background-attachment: fixed;
}

button, input { font-family: inherit; }
mark { background: rgba(78,168,62,0.25); color: var(--green-dark); padding: 0 2px; border-radius: 2px; font-weight: 700; }

/* TOP BAR */
.topbar {
    border-bottom: 1px solid var(--border);
    background: rgba(255,255,255,0.92);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    position: sticky;
    top: 0;
    z-index: 50;
    padding: 12px 20px;
    box-shadow: var(--shadow-sm);
}

.topbar-inner {
    max-width: 1400px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
}

.logo-btn {
    background: none;
    border: none;
    padding: 0;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 12px;
    transition: opacity 0.15s;
}

.logo-btn:hover { opacity: 0.8; }

.logo-img {
    width: 44px;
    height: 44px;
    object-fit: contain;
    flex-shrink: 0;
}

.logo-text {
    font-family: 'Montserrat', sans-serif;
    font-size: 11px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.12em;
    font-weight: 700;
    border-left: 1px solid var(--border-strong);
    padding-left: 12px;
    line-height: 1.2;
}

.contact-mini {
    display: flex;
    gap: 8px;
    font-size: 13px;
    color: var(--text-muted);
    align-items: center;
}

/* VIEWS */
.view { display: none; }
.view.active { display: block; }

/* HOME */
.home {
    max-width: 1100px;
    margin: 0 auto;
    padding: 60px 24px 80px;
    min-height: calc(100vh - 70px);
    min-height: calc(100dvh - 70px);
    display: flex;
    flex-direction: column;
    justify-content: center;
}

.home-hero {
    text-align: center;
    margin-bottom: 48px;
}

.home-pretitle {
    font-size: 12px;
    color: var(--green-dark);
    text-transform: uppercase;
    letter-spacing: 0.2em;
    font-weight: 700;
    margin-bottom: 16px;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 6px 14px;
    background: rgba(78,168,62,0.1);
    border-radius: 100px;
    border: 1px solid rgba(78,168,62,0.2);
}

.home-pretitle::before {
    content: '';
    width: 6px;
    height: 6px;
    background: var(--green);
    border-radius: 50%;
}

.home-title {
    font-family: 'Montserrat', sans-serif;
    font-weight: 900;
    font-size: clamp(38px, 7vw, 68px);
    line-height: 1;
    letter-spacing: -0.03em;
    margin-bottom: 18px;
    color: var(--navy);
}

.home-title .accent { color: var(--green); }
.home-title .accent-red { color: var(--red); }

.home-subtitle {
    font-size: clamp(15px, 2vw, 18px);
    color: var(--text-muted);
    max-width: 600px;
    margin: 0 auto;
    line-height: 1.5;
}

.home-cards {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 20px;
}

.home-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 36px 28px;
    cursor: pointer;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    display: flex;
    flex-direction: column;
    gap: 14px;
    position: relative;
    overflow: hidden;
    color: inherit;
    font-family: inherit;
    text-align: left;
    box-shadow: var(--shadow-sm);
}

.home-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 4px;
    background: linear-gradient(90deg, var(--green), var(--navy));
    transform: scaleX(0);
    transform-origin: left;
    transition: transform 0.3s;
}

.home-card.alt::before {
    background: linear-gradient(90deg, var(--navy), var(--red));
}

.home-card:hover {
    border-color: var(--navy);
    transform: translateY(-4px);
    box-shadow: var(--shadow-lg);
}

.home-card:hover::before { transform: scaleX(1); }

.home-card-icon {
    width: 56px;
    height: 56px;
    background: rgba(78,168,62,0.12);
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--green-dark);
    position: relative;
    z-index: 1;
}

.home-card.alt .home-card-icon {
    background: rgba(30,44,91,0.1);
    color: var(--navy);
}

.home-card-title {
    font-family: 'Montserrat', sans-serif;
    font-weight: 800;
    font-size: 22px;
    letter-spacing: -0.01em;
    line-height: 1.1;
    color: var(--navy);
    position: relative;
    z-index: 1;
}

.home-card-desc {
    font-size: 14px;
    color: var(--text-muted);
    line-height: 1.5;
    position: relative;
    z-index: 1;
}

.home-card-arrow {
    margin-top: auto;
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    font-weight: 700;
    color: var(--green-dark);
    position: relative;
    z-index: 1;
    text-transform: uppercase;
    letter-spacing: 0.05em;
}

.home-card.alt .home-card-arrow { color: var(--navy); }

.home-card:hover .home-card-arrow svg { transform: translateX(4px); }
.home-card-arrow svg { transition: transform 0.2s; }

/* CONSULTOR */
.consultor {
    max-width: 1400px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    height: calc(100vh - 70px);
    height: calc(100dvh - 70px);
}

.consultor-controls {
    padding: 16px 20px;
    background: var(--bg-card);
    border-bottom: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    gap: 10px;
    flex-shrink: 0;
    box-shadow: var(--shadow-sm);
}

.search-wrap {
    position: relative;
}

.search-input {
    width: 100%;
    padding: 13px 42px 13px 44px;
    border: 2px solid var(--border);
    border-radius: 10px;
    font-size: 15px;
    background: var(--bg-soft);
    color: var(--text);
    outline: none;
    transition: all 0.2s;
}

.search-input:focus {
    border-color: var(--green);
    background: white;
    box-shadow: 0 0 0 3px rgba(78,168,62,0.15);
}

.search-input::placeholder { color: var(--text-dim); }

.search-icon {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-muted);
    pointer-events: none;
}

.clear-btn {
    position: absolute;
    right: 10px;
    top: 50%;
    transform: translateY(-50%);
    width: 26px;
    height: 26px;
    border: none;
    background: var(--border-strong);
    color: white;
    border-radius: 50%;
    font-size: 14px;
    cursor: pointer;
    display: none;
    align-items: center;
    justify-content: center;
    font-weight: 700;
}

.clear-btn.visible { display: flex; }
.clear-btn:hover { background: var(--red); }

.suggestions {
    position: absolute;
    top: 100%;
    left: 0;
    right: 0;
    background: var(--bg-card);
    border: 1px solid var(--border-strong);
    border-top: none;
    border-radius: 0 0 10px 10px;
    max-height: 360px;
    overflow-y: auto;
    z-index: 100;
    box-shadow: var(--shadow-lg);
    display: none;
    margin-top: -1px;
}

.suggestions.visible { display: block; }

.sug-header {
    padding: 8px 14px;
    background: var(--navy);
    color: white;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    position: sticky;
    top: 0;
    z-index: 1;
}

.sug-item {
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    font-size: 13px;
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
    transition: background 0.1s;
}

.sug-item:hover, .sug-item:active { background: var(--bg-soft); }
.sug-item:last-child { border-bottom: none; }

.sug-tag {
    display: inline-block;
    padding: 2px 7px;
    border-radius: 4px;
    font-size: 10px;
    font-weight: 700;
    flex-shrink: 0;
}

.tag-prod { background: rgba(78,168,62,0.15); color: var(--green-dark); }
.tag-num { background: rgba(30,44,91,0.1); color: var(--navy); }

.sug-text { color: var(--text); flex: 1; min-width: 0; word-break: break-word; }
.sug-meta { font-size: 11px; color: var(--text-muted); width: 100%; margin-top: 3px; }

.filter-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
}

.filter-grid input {
    padding: 9px 12px;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 13px;
    background: var(--bg-soft);
    color: var(--text);
    outline: none;
    min-width: 0;
    transition: all 0.15s;
}

.filter-grid input:focus { border-color: var(--green); background: white; }
.filter-grid input::placeholder { color: var(--text-dim); }

.disc-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 14px;
    background: linear-gradient(135deg, rgba(78,168,62,0.08), rgba(78,168,62,0.04));
    border-radius: 10px;
    border: 1px solid rgba(78,168,62,0.2);
}

.disc-row label {
    font-size: 12px;
    font-weight: 700;
    color: var(--green-dark);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    white-space: nowrap;
}

.disc-row input {
    width: 70px;
    padding: 7px 8px;
    border: 1px solid var(--green);
    border-radius: 6px;
    font-size: 16px;
    text-align: center;
    font-weight: 800;
    color: var(--green-dark);
    background: white;
    outline: none;
    transition: all 0.15s;
}

.disc-row input:focus {
    box-shadow: 0 0 0 3px rgba(78,168,62,0.2);
}

.disc-row .pct {
    font-weight: 800;
    color: var(--green-dark);
    font-size: 16px;
    margin-left: -6px;
}

.disc-row .disc-hint {
    font-size: 11px;
    color: var(--text-muted);
    margin-left: auto;
    text-align: right;
    line-height: 1.3;
    font-weight: 500;
}

.family-bar {
    background: var(--bg-card);
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
    white-space: nowrap;
    flex-shrink: 0;
    -webkit-overflow-scrolling: touch;
}

.family-bar::-webkit-scrollbar { height: 4px; }
.family-bar::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 4px; }

.fam-chip {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 7px 13px;
    margin-right: 6px;
    background: var(--bg-soft);
    color: var(--text-muted);
    border: 1px solid var(--border);
    border-radius: 100px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    user-select: none;
    transition: all 0.15s;
}

.fam-chip:hover { border-color: var(--navy); color: var(--navy); }
.fam-chip.active {
    background: var(--navy);
    color: white;
    border-color: var(--navy);
}

.fam-chip .pdf-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--red);
    display: inline-block;
}

.fam-chip.active .pdf-dot { background: white; }

.results-info {
    padding: 8px 16px;
    background: var(--bg-soft);
    color: var(--text-muted);
    font-size: 12px;
    font-weight: 600;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
    text-transform: uppercase;
    letter-spacing: 0.05em;
}

.results-info .disc-info {
    color: var(--green-dark);
    font-weight: 700;
}

.results {
    flex: 1;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    padding: 12px;
}

.product-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-left: 3px solid var(--navy);
    border-radius: 10px;
    padding: 14px 16px;
    margin-bottom: 8px;
    transition: all 0.15s;
    box-shadow: var(--shadow-sm);
}

.product-card:hover {
    border-left-color: var(--green);
    box-shadow: var(--shadow);
}

.card-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 10px;
    margin-bottom: 6px;
}

.card-num {
    font-size: 11px;
    color: var(--text-muted);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
}

.card-num strong {
    color: var(--navy);
    font-size: 14px;
    font-weight: 800;
}

.card-fam {
    font-size: 10px;
    font-weight: 700;
    color: var(--navy);
    background: rgba(30,44,91,0.08);
    padding: 4px 10px;
    border-radius: 100px;
    white-space: nowrap;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    cursor: pointer;
    transition: all 0.15s;
    border: 1px solid transparent;
    display: inline-flex;
    align-items: center;
    gap: 5px;
}

.card-fam.has-pdf { border-color: var(--red); }

.card-fam:hover {
    background: var(--navy);
    color: white;
}

.card-fam.has-pdf:hover {
    background: var(--red);
    border-color: var(--red);
}

.card-codigo {
    font-size: 11px;
    color: var(--text-muted);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin: 2px 0 8px;
    display: flex;
    align-items: center;
    gap: 6px;
    flex-wrap: wrap;
}

.card-codigo strong {
    color: var(--navy);
    font-weight: 800;
    font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
    font-size: 12px;
    background: rgba(30,44,91,0.07);
    padding: 2px 8px;
    border-radius: 5px;
    text-transform: none;
    letter-spacing: 0.2px;
}

.card-desc {
    font-size: 14px;
    color: var(--text);
    line-height: 1.4;
    margin-bottom: 10px;
    font-weight: 500;
}

.card-prices {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding-top: 10px;
    border-top: 1px dashed var(--border);
    gap: 10px;
}

.price-block {
    display: flex;
    flex-direction: column;
    gap: 2px;
}

.price-label {
    font-size: 10px;
    color: var(--text-muted);
    text-transform: uppercase;
    font-weight: 600;
    letter-spacing: 0.08em;
}

.price-lista {
    font-size: 14px;
    color: var(--text-muted);
    font-weight: 600;
    text-decoration: line-through;
    text-decoration-color: var(--text-dim);
}

.price-neto {
    font-size: 19px;
    color: var(--green-dark);
    font-weight: 800;
    font-variant-numeric: tabular-nums;
    letter-spacing: -0.01em;
}

.price-neto.no-disc { color: var(--navy); }

.card-actions {
    display: flex;
    gap: 6px;
}

.card-action-btn {
    background: var(--bg-soft);
    border: 1px solid var(--border);
    color: var(--navy);
    height: 36px;
    padding: 0 12px;
    border-radius: 8px;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 7px;
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    transition: all 0.15s;
    white-space: nowrap;
}

.card-action-btn svg { flex-shrink: 0; }

.card-action-btn:hover {
    border-color: var(--red);
    color: var(--red);
    background: rgba(200,16,46,0.05);
}

.empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-muted);
}

.empty-icon { font-size: 42px; margin-bottom: 12px; opacity: 0.4; }
.empty-title { font-size: 16px; font-weight: 700; margin-bottom: 6px; color: var(--navy); }
.empty-sub { font-size: 13px; }

.load-more {
    text-align: center;
    padding: 14px;
    color: var(--navy);
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    cursor: pointer;
    background: var(--bg-soft);
    border-radius: 10px;
    border: 1px dashed var(--border-strong);
    transition: all 0.15s;
}

.load-more:hover { background: var(--navy); color: white; border-color: var(--navy); }

/* LISTAS */
.listas {
    max-width: 1400px;
    margin: 0 auto;
    padding: 24px 20px 60px;
}

.listas-header {
    margin-bottom: 24px;
    display: flex;
    flex-direction: column;
    gap: 16px;
}

.listas-title-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
}

.listas-title {
    font-family: 'Montserrat', sans-serif;
    font-weight: 900;
    font-size: 30px;
    letter-spacing: -0.02em;
    line-height: 1;
    color: var(--navy);
}

.listas-subtitle {
    font-size: 12px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-top: 6px;
    font-weight: 600;
}

.listas-search {
    position: relative;
    max-width: 360px;
    flex: 1;
    min-width: 200px;
}

.listas-search input {
    width: 100%;
    padding: 10px 14px 10px 38px;
    border: 1px solid var(--border);
    border-radius: 10px;
    font-size: 14px;
    background: var(--bg-card);
    color: var(--text);
    outline: none;
    transition: all 0.15s;
}

.listas-search input:focus {
    border-color: var(--green);
    box-shadow: 0 0 0 3px rgba(78,168,62,0.15);
}

.listas-search input::placeholder { color: var(--text-dim); }

.listas-search-icon {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-muted);
    pointer-events: none;
}

.listas-count {
    font-size: 12px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;

/* GRID DE LISTAS */
.grid {

.lista-card {

.lista-thumb {

    align-items: center;

}

.lista-thumb-placeholder {
    display: none;

    align-items: center;

.lista-card:hover .download-btn {

}

.lista-body {

}

.lista-card-title {

/* MODAL */
.modal {

.btn {

.btn:hover { border-color: var(--border-strong); background: var(--border); }

}

.btn-icon { padding: 9px; width: 38px; justify-content: center; }

.modal-toolbar {
    display: flex;
    gap: 6px;
    padding: 10px 16px;
    background: var(--bg-soft);
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
}

.toolbar-btn {
    background: var(--bg-card);
    color: var(--text-muted);

    padding: 7px 12px;
    border-radius: 7px;

    font-size: 12px;

}

}

.modal-body {
    flex: 1;

}

.modal-body iframe {

/* PDF.js custom viewer (mobile) */
.pdf-mobile-viewer {

.pdf-mobile-viewer.loading::before {

/* BOTTOM SHEET - Buscador dentro de un PDF */
.sheet-backdrop {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.4);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s ease;
    z-index: 5;
}

.sheet-backdrop.open {
    opacity: 1;
    pointer-events: auto;
}

.sheet {
    position: absolute;
    left: 0;
    right: 0;
    bottom: 0;
    background: var(--bg-card);
    border-radius: 16px 16px 0 0;
    box-shadow: 0 -8px 32px rgba(0,0,0,0.3);
    transform: translateY(100%);
    transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    z-index: 10;
    display: flex;
    flex-direction: column;
    max-height: 85%;
    height: 85%;
    overflow: hidden;
}

.sheet.open { transform: translateY(0); }

/* Desktop: el sheet pasa a ser un panel lateral derecho flotante */
@media (min-width: 901px) {
    .sheet {
        left: auto;
        right: 0;
        top: 0;
        bottom: 0;
        width: 440px;
        max-width: 50vw;

        border-radius: 16px 0 0 16px;

}

.sheet-title {
    font-family: 'Montserrat', sans-serif;

.sheet-title-prefix {

.sheet-controls {

}

const fmtMoney = v => '$' + v.toLocaleString('es-AR', {minimumFractionDigits:2, maximumFractionDigits:2});
const escapeHtml = s => String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const thumbName = file => file.replace(/\.pdf$/i, '.jpg');

/* NAV */
let _suppressPush = false; // bandera para evitar push duplicados al venir de popstate

function goView(name, opts) {
    opts = opts || {};
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    $('view-' + name).classList.add('active');
    const tags = { home: 'Listas y Precios', consultor: 'Consultor de Precios', listas: 'Listas PDF' };
    $('viewTag').textContent = tags[name] || 'Listas y Precios';
    window.scrollTo(0, 0);

    // Push state para que "atrás" funcione bien
    if (!_suppressPush && !opts.replace) {
        const cur = history.state;
        // Solo push si la vista cambia respecto a la actual
        if (!cur || cur.view !== name) {
            history.pushState({ view: name }, '', '');
        }
    }
    if (opts.replace) {
        history.replaceState({ view: name }, '', '');
    }

    if (name === 'consultor') {
        loadData().then(initConsultor).catch(e => {
            $('resultsCount').textContent = 'Error cargando productos';
            $('results').innerHTML = '<div class="empty"><div class="empty-title">Error al cargar</div><div class="empty-sub">' + escapeHtml(e.message) + '</div></div>';
            console.error(e);
        });
    }
    if (name === 'listas') renderListas();
}

/* TOAST */
let toastTimer;
function toast(msg) {
    const t = $('toast');
    t.textContent = msg;
    t.classList.add('visible');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('visible'), 2400);
}

/* DATA */
async function loadData() {
    if (!_dataReady) {
        _dataReady = fetch('productos.json', { cache: 'no-cache' })
            .then(r => { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
            .then(json => {
                DATA = json.map(it => ({ p: it.p, n: it.n, d: it.d, c: it.c, pr: it.pl }));
                DATA.forEach(it => {
                    it._p = norm(it.p);
                    it._n = norm(it.n);
                    it._d = norm(it.d);
                    it._c = norm(it.c);
                    it._all = it._p + ' ' + it._n + ' ' + it._d + ' ' + it._c;
                });
            });
    }
    return _dataReady;
}

/* CONSULTOR */
function initConsultor() {
    if (consultorReady) { render(); return; }
    consultorReady = true;

    // Forzar el valor del input al estado actual (incluye el descuento de la URL si vino así)
    $('discount').value = state.discount;

    $('searchGeneral').addEventListener('input', e => {
        state.q = e.target.value;
        state.renderLimit = 50;
        updateClearBtn();
        renderSuggestions();
        debounced(render)();
    });
    $('searchGeneral').addEventListener('focus', renderSuggestions);
    $('searchGeneral').addEventListener('blur', () => {
        setTimeout(() => $('suggestions').classList.remove('visible'), 150);
    });
    $('clearGeneral').addEventListener('click', () => {
        state.q = '';
        $('searchGeneral').value = '';
        updateClearBtn();
        $('suggestions').classList.remove('visible');
        state.renderLimit = 50;
        render();
        $('searchGeneral').focus();
    });
    $('filterNumero').addEventListener('input', e => {
        state.numero = e.target.value;
        state.renderLimit = 50;
        debounced(render)();
    });
    $('filterDesc').addEventListener('input', e => {
        state.desc = e.target.value;
        state.renderLimit = 50;
        debounced(render)();
    });
    $('discount').addEventListener('input', e => {
        let v = parseFloat(e.target.value) || 0;
        if (v < 0) v = 0;
        if (v > 99) v = 99;
        state.discount = v;
        render();
    });
    render();
}

const families = () => [...new Set(DATA.map(d => d.p))].sort();

    const nTerm = norm(state.numero);
    const dTerms = norm(state.desc).split(/\s+/).filter(Boolean);
    return DATA.filter(it => {
        if (qTerms.length && !qTerms.every(t => it._all.includes(t))) return false;
        if (nTerm && !it._n.includes(nTerm) && !it._c.includes(nTerm)) return false;
        if (dTerms.length && !dTerms.every(t => it._d.includes(t))) return false;
        if (applyFamily && state.family && it.p !== state.family) return false;
        return true;
    });
}

function highlight(text, terms) {
    if (!terms.length) return escapeHtml(text);
    const nText = norm(text);
    const ranges = [];
    terms.forEach(t => {
        if (!t) return;
        let idx = 0;
        while ((idx = nText.indexOf(t, idx)) !== -1) {
            ranges.push([idx, idx + t.length]);
            idx += t.length;
        }
    });
    if (!ranges.length) return escapeHtml(text);
    ranges.sort((a, b) => a[0] - b[0]);
    const merged = [ranges[0]];
    for (let i = 1; i < ranges.length; i++) {
        const last = merged[merged.length - 1];
        if (ranges[i][0] <= last[1]) last[1] = Math.max(last[1], ranges[i][1]);
        else merged.push(ranges[i]);
    }
    let out = '', pos = 0;
    merged.forEach(([s, e]) => {
        out += escapeHtml(text.slice(pos, s));
        out += '<mark>' + escapeHtml(text.slice(s, e)) + '</mark>';
        pos = e;
    });
    out += escapeHtml(text.slice(pos));
    return out;
}

function render() {
    const filtered = filterBase(true);
    const total = filtered.length;
    const disc = state.discount;

    $('resultsCount').textContent = total === DATA.length
        ? total + ' productos'
        : total + ' de ' + DATA.length + ' productos';
    $('discInfo').textContent = disc > 0 ? ('Tu descuento ' + disc + '%') : '';

    renderFamilies();

    const res = $('results');
    if (total === 0) {
        res.innerHTML = '<div class="empty"><div class="empty-icon">🔍</div><div class="empty-title">Sin resultados</div><div class="empty-sub">Probá con otros términos o limpiá los filtros</div></div>';
        return;
    }

    const qTerms = [norm(state.q), norm(state.numero), norm(state.desc)].join(' ').split(/\s+/).filter(Boolean);
    const slice = filtered.slice(0, state.renderLimit);
    const mult = (100 - disc) / 100;

    let html = '';
    slice.forEach(it => {

            + escapeHtml(it.p)

            + '</div>'
            + (it.c ? '<div class="card-codigo">Código Único: <strong>' + highlight(it.c, qTerms) + '</strong></div>' : '')
            + '<div class="card-desc">' + highlight(it.d, qTerms) + '</div>'
            + '<div class="card-prices">'
            + '<div class="price-block"><span class="price-label">' + (disc > 0 ? 'Lista' : 'Precio') + '</span>'
            + '<span class="price-' + (disc > 0 ? 'lista' : 'neto no-disc') + '">' + fmtMoney(it.pr) + '</span>'
            + '</div>';
        if (disc > 0) {
            html += '<div class="price-block" style="align-items:flex-end"><span class="price-label">Tu precio (-' + disc + '%)</span>'
                + '<span class="price-neto">' + fmtMoney(neto) + '</span></div>';
        } else {
            html += '<div class="card-actions">';
            if (hasPdf) {
                html += '<button class="card-action-btn" data-action="open-pdf" data-fam="' + escapeHtml(it.p) + '" title="Ver lista de precios en PDF">'
                    + '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>'
                    + '<span>Abrir Lista PDF</span>'
                    + '</button>';
            }
            html += '</div>';
        }
        html += '</div></div>';
    });

    if (total > state.renderLimit) {
        html += '<div class="load-more">Mostrando ' + state.renderLimit + ' de ' + total + ' · Tocá para ver más</div>';
    }
    res.innerHTML = html;

    res.querySelectorAll('.card-fam').forEach(el => {

        el.addEventListener('click', () => openPdfByFamily(el.dataset.fam));

}

function renderSuggestions() {
    const box = $('suggestions');
    const q = state.q.trim();
    if (q.length < 2) { box.classList.remove('visible'); box.innerHTML = ''; return; }
    const nq = norm(q);
    const qTerms = nq.split(/\s+/).filter(Boolean);

    const famByName = [];
    families().forEach(f => {
        if (qTerms.every(t => norm(f).includes(t))) famByName.push(f);
    });

    const A = [], B = [], C = [], D = [];
    let total = 0;
    for (const it of DATA) {
        if (!qTerms.every(t => it._all.includes(t))) continue;
        total++;
        if (it._n === nq) { A.push(it); continue; }
        if (/^\d/.test(nq) && it._n.startsWith(nq)) { B.push(it); continue; }
        const firstTerm = qTerms[0];
        const descWords = it._d.split(/\s+/);
        if (descWords.some(w => w.startsWith(firstTerm))) { C.push(it); continue; }
        D.push(it);
    }

    const LIMIT = 40;
    const ordered = [...A, ...B, ...C, ...D].slice(0, LIMIT);

    let html = '';
    if (total > 0) {
        const extra = total > LIMIT ? ' (mostrando primeros ' + LIMIT + ')' : '';
        html += '<div class="sug-header">' + total + ' resultado' + (total !== 1 ? 's' : '') + extra + '</div>';
    }
    famByName.forEach(f => {
        html += '<div class="sug-item" data-type="fam" data-val="' + escapeHtml(f) + '">'
            + '<span class="sug-tag tag-prod">FAMILIA</span>'
            + '<span class="sug-text">' + highlight(f, qTerms) + '</span>'
            + '</div>';
    });
    ordered.forEach(it => {
        html += '<div class="sug-item" data-type="item" data-val="' + escapeHtml(it.n) + '" data-desc="' + escapeHtml(it.d) + '">'
            + '<span class="sug-tag tag-num">N° ' + escapeHtml(it.n) + '</span>'
            + '<span class="sug-text">' + highlight(it.d, qTerms) + '</span>'
            + '<div class="sug-meta">' + escapeHtml(it.p) + (it.c ? ' · Cód. ' + escapeHtml(it.c) : '') + ' · ' + fmtMoney(it.pr) + '</div></div>';
    });

    if (!html) { box.classList.remove('visible'); box.innerHTML = ''; return; }
    box.innerHTML = html;
    box.classList.add('visible');
    box.querySelectorAll('.sug-item').forEach(el => {
        el.addEventListener('mousedown', e => e.preventDefault());
        el.addEventListener('click', () => {
            const t = el.dataset.type, v = el.dataset.val;
            if (t === 'fam') {
                state.family = v;
                state.q = ''; state.numero = ''; state.desc = '';
                $('searchGeneral').value = '';
                $('filterNumero').value = '';
                $('filterDesc').value = '';
            } else {
                const desc = el.dataset.desc;
                state.q = '';
                state.desc = desc;
                state.numero = v;
                state.family = null;
                $('searchGeneral').value = '';
                $('filterDesc').value = desc;
                $('filterNumero').value = v;
            }
            box.classList.remove('visible');
            state.renderLimit = 50;
            render();
            updateClearBtn();
        });
    });
}

function updateClearBtn() {
    $('clearGeneral').classList.toggle('visible', state.q.length > 0);
}

let tmr;
function debounced(fn, ms = 80) {
    return (...args) => {
        clearTimeout(tmr);
        tmr = setTimeout(() => fn(...args), ms);
    };
}

// Detección de mobile (touch + ancho pequeño)
function isMobile() {
    return ('ontouchstart' in window || navigator.maxTouchPoints > 0) && window.innerWidth <= 900;
}

// PDF.js — carga lazy desde CDN solo cuando se necesita
let pdfjsLib = null;
let pdfjsLoading = null;

function loadPdfJs() {
    if (pdfjsLib) return Promise.resolve(pdfjsLib);
    if (pdfjsLoading) return pdfjsLoading;

    pdfjsLoading = new Promise((resolve, reject) => {
        // Cargar pdf.js como módulo ES
        import('https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.4.168/pdf.min.mjs')
            .then(mod => {
                pdfjsLib = mod;
                pdfjsLib.GlobalWorkerOptions.workerSrc =
                    'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.4.168/pdf.worker.min.mjs';
                resolve(pdfjsLib);
            })
            .catch(err => {
                pdfjsLoading = null;
                reject(err);
            });
    });

    return pdfjsLoading;
}

// Estado del visor mobile
let mobilePdfDoc = null;
let mobilePdfPages = [];      // array de {container, canvas, rendered, viewport}
let mobileObserver = null;     // IntersectionObserver para lazy render

async function renderPdfMobile(url) {
    const viewer = $('pdfMobileViewer');
    viewer.style.display = 'block';
    viewer.innerHTML = '';
    viewer.className = 'pdf-mobile-viewer loading';
    $('pdfFrame').style.display = 'none';

    // Limpiar visor previo
    if (mobileObserver) { mobileObserver.disconnect(); mobileObserver = null; }
    if (mobilePdfDoc) { try { mobilePdfDoc.destroy(); } catch(e) {} mobilePdfDoc = null; }
    mobilePdfPages = [];

    // Esperar un frame para que el modal tenga ancho real
    await new Promise(r => requestAnimationFrame(r));

    try {
        const pdfjs = await loadPdfJs();
        const loadingTask = pdfjs.getDocument({ url });
        mobilePdfDoc = await loadingTask.promise;

        viewer.classList.remove('loading');

        const numPages = mobilePdfDoc.numPages;
        const containerWidth = Math.max(viewer.clientWidth - 24, 280); // padding lateral, mínimo 280

        // Crear placeholders para todas las páginas (con el aspect ratio correcto)
        for (let pageNum = 1; pageNum <= numPages; pageNum++) {
            const page = await mobilePdfDoc.getPage(pageNum);
            const viewport = page.getViewport({ scale: 1 });
            const scale = containerWidth / viewport.width;
            const scaledViewport = page.getViewport({ scale });

            const container = document.createElement('div');
            container.className = 'pdf-page-container pdf-page-placeholder';
            container.dataset.page = pageNum;
            container.style.width = scaledViewport.width + 'px';
            container.style.height = scaledViewport.height + 'px';
            container.style.maxWidth = '100%';
            viewer.appendChild(container);

            mobilePdfPages.push({
                container,
                pageNum,
                page,
                viewport: scaledViewport,
                rendered: false
            });
        }

        // Lazy render: solo renderizo páginas visibles (+ margen)
        mobileObserver = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    const pageNum = parseInt(entry.target.dataset.page);
                    renderMobilePage(pageNum);
                    if (pageNum < mobilePdfPages.length) renderMobilePage(pageNum + 1);
                }
            });
        }, {
            root: viewer,
            rootMargin: '300px 0px',
            threshold: 0
        });

        mobilePdfPages.forEach(p => mobileObserver.observe(p.container));

    } catch (err) {
        console.error('Error PDF.js:', err);
        viewer.classList.remove('loading');
        const fallbackUrl = PDF_FOLDER + (currentPdf ? encodeURIComponent(currentPdf.file) : '');
        viewer.innerHTML = '<div class="pdf-mobile-error">'
            + '<strong>No se pudo cargar el PDF</strong>'
            + 'Probá tocando <a href="' + fallbackUrl + '" target="_blank">acá</a> para abrirlo directamente en tu navegador.'
            + '</div>';
    }
}

async function renderMobilePage(pageNum) {
    const p = mobilePdfPages[pageNum - 1];
    if (!p || p.rendered) return;
    p.rendered = true; // marcar antes para evitar dobles llamadas

    try {
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        const dpr = Math.min(window.devicePixelRatio || 1, 2); // capear a 2x para no consumir tanta memoria

        canvas.width = p.viewport.width * dpr;
        canvas.height = p.viewport.height * dpr;
        ctx.scale(dpr, dpr);

        await p.page.render({
            canvasContext: ctx,
            viewport: p.viewport
        }).promise;

        // Reemplazar el placeholder con el canvas
        p.container.classList.remove('pdf-page-placeholder');
        p.container.innerHTML = '';
        p.container.appendChild(canvas);
    } catch (err) {
        console.error('Error rendering page', pageNum, err);
        p.rendered = false;
    }
}

function clearMobilePdfViewer() {
    if (mobileObserver) { mobileObserver.disconnect(); mobileObserver = null; }
    if (mobilePdfDoc) { try { mobilePdfDoc.destroy(); } catch(e) {} mobilePdfDoc = null; }
    mobilePdfPages = [];
    const viewer = $('pdfMobileViewer');
    viewer.innerHTML = '';
    viewer.style.display = 'none';
    viewer.className = 'pdf-mobile-viewer';
}

function openPdf(lista) {
    if (!lista) return;
    currentPdf = lista;
    const url = PDF_FOLDER + encodeURIComponent(lista.file);
    $('modalTitle').textContent = lista.title;
    $('modalSubtitle').textContent = lista.desc;

    if (isMobile()) {
        $('pdfFrame').src = 'about:blank';
        $('pdfFrame').style.display = 'none';
        renderPdfMobile(url);
    } else {
        clearMobilePdfViewer();
        $('pdfFrame').style.display = 'block';
        $('pdfFrame').src = url;
    }

    $('modal').classList.add('active');
    document.body.style.overflow = 'hidden';

    // History: push estado modal
    if (!_suppressPush) {
        history.pushState({ view: 'modal' }, '', '');
    }
}

function openPdfByFamily(family) {
    const file = FAMILY_TO_PDF[family];
    if (!file) { toast('PDF no disponible para esta familia'); return; }
    const lista = LISTAS.find(l => l.file === file);
    if (lista) {
        currentPdf = { ...lista, _originFamily: family };
        const url = PDF_FOLDER + encodeURIComponent(lista.file);
        $('modalTitle').textContent = lista.title;
        $('modalSubtitle').textContent = lista.desc;

        if (isMobile()) {
            $('pdfFrame').src = 'about:blank';
            $('pdfFrame').style.display = 'none';
            renderPdfMobile(url);
        } else {
            clearMobilePdfViewer();
            $('pdfFrame').style.display = 'block';
            $('pdfFrame').src = url;
        }

        $('modal').classList.add('active');
        document.body.style.overflow = 'hidden';

        if (!_suppressPush) {
            history.pushState({ view: 'modal' }, '', '');
        }
    } else toast('PDF no disponible');
}

function closeModal(skipHistory) {
    if (!$('modal').classList.contains('active')) return;
    // Si el sheet está abierto, cerrarlo primero
    if (sheetState.open) {
        closeSheet(true); // sin afectar history
    }
    $('modal').classList.remove('active');
    $('pdfFrame').src = 'about:blank';
    clearMobilePdfViewer();
    currentPdf = null;
    document.body.style.overflow = '';

    if (!skipHistory && history.state && history.state.view === 'modal') {
        history.back();
    }
}

function downloadPdf(lista) {
    if (!lista) return;
    const a = document.createElement('a');
    a.href = PDF_FOLDER + encodeURIComponent(lista.file);
    a.download = lista.file;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    toast('Descargando: ' + lista.title);
}

function getCurrentUrl() {
    if (!currentPdf) return '';
    const base = window.location.href.split('?')[0].split('#')[0].replace(/\/[^\/]*$/, '/');
    return base + PDF_FOLDER + encodeURIComponent(currentPdf.file);
}

$('closeBtn').addEventListener('click', closeModal);
$('modal').addEventListener('click', e => { if (e.target === $('modal')) closeModal(); });
document.addEventListener('keydown', e => {
    if (e.key === 'Escape' && $('modal').classList.contains('active')) closeModal();
});

$('downloadBtn').addEventListener('click', () => downloadPdf(currentPdf));

$('newTabBtn').addEventListener('click', () => {
    if (currentPdf) window.open(PDF_FOLDER + encodeURIComponent(currentPdf.file), '_blank');
});

$('searchInListBtn').addEventListener('click', () => {
    if (!currentPdf) return;
    const file = currentPdf.file;
    const fam = currentPdf._originFamily || Object.keys(FAMILY_TO_PDF).find(k => FAMILY_TO_PDF[k] === file);

    // Mismo comportamiento en desktop y mobile: abrir el sheet sin salir del PDF
    if (!fam) { toast('Esta lista no tiene productos asociados'); return; }
    openSheet(fam, currentPdf.title);
});

/* ============================================================
   BOTTOM SHEET (Buscar dentro de una lista en mobile)
   ============================================================ */

let sheetState = {
    family: null,
    q: '',
    discount: 0,
    open: false
};

function openSheet(family, listaTitle) {
    sheetState.family = family;
    sheetState.q = '';
    sheetState.discount = _initialDiscount;  // toma el descuento de la URL si hay
    $('sheetTitle').textContent = listaTitle || family;
    $('sheetSearch').value = '';
    $('sheetDiscount').value = _initialDiscount;

    // Asegurarse que los datos estén cargados
    loadData().then(() => {
        renderSheet();
        $('sheetBackdrop').classList.add('open');
        $('sheet').classList.add('open');
        sheetState.open = true;

        // Push history para que "atrás" cierre el sheet
        history.pushState({ view: 'sheet' }, '', '');

        // Foco en el buscador después de la animación
        setTimeout(() => $('sheetSearch').focus(), 350);
    }).catch(err => {
        toast('Error cargando productos');
        console.error(err);
    });
}

function closeSheet(skipHistory) {
    if (!sheetState.open) return;
    $('sheet').classList.remove('open');
    $('sheetBackdrop').classList.remove('open');
    sheetState.open = false;

    // Volver el foco al PDF
    if (document.activeElement && document.activeElement.blur) {
        document.activeElement.blur();
    }

    if (!skipHistory && history.state && history.state.view === 'sheet') {
        history.back();
    }
}

function renderSheet() {
    const fam = sheetState.family;
    if (!fam) return;

    const q = sheetState.q.trim();
    const nq = norm(q);
    const qTerms = nq.split(/\s+/).filter(Boolean);
    const isNumericQuery = qTerms.length === 1 && /^\d+$/.test(nq);

    // Productos de esta familia que matchean el filtro
    const matched = DATA.filter(it => {
        if (it.p !== fam) return false;
        if (qTerms.length && !qTerms.every(t => it._all.includes(t))) return false;
        return true;
    });

    // Ordenar por prioridad si hay búsqueda
    let ordered;
    if (qTerms.length) {
        const A = []; // match exacto del código
        const B = []; // código empieza con la query (ej: q="10" → 100, 101...)
        const C = []; // descripción empieza con la query
        const D = []; // contiene la query en cualquier lado

        for (const it of matched) {
            const codeMatch = it._n === nq;
            const codeStarts = isNumericQuery && it._n.startsWith(nq);
            const descStarts = qTerms.some(t => {
                const words = it._d.split(/\s+/);
                return words.some(w => w.startsWith(t));
            });

            if (codeMatch) A.push(it);
            else if (codeStarts) B.push(it);
            else if (descStarts) C.push(it);
            else D.push(it);
        }

        // Dentro de B, ordenar numéricamente para que aparezcan en orden lógico (10, 11, 12... 100, 101...)
        B.sort((x, y) => {
            const nx = parseInt(x.n, 10);
            const ny = parseInt(y.n, 10);
            if (!isNaN(nx) && !isNaN(ny)) return nx - ny;
            return x._n.localeCompare(y._n);
        });

        ordered = [...A, ...B, ...C, ...D];
    } else {
        // Sin búsqueda: orden natural
        ordered = matched;
    }

    const disc = sheetState.discount;
    const mult = (100 - disc) / 100;

    $('sheetInfo').textContent = ordered.length + (ordered.length === 1 ? ' producto' : ' productos');

    const res = $('sheetResults');
    if (ordered.length === 0) {
        res.innerHTML = '<div class="sheet-empty"><div class="sheet-empty-title">Sin resultados</div>Probá con otro término</div>';
        return;
    }

    const LIMIT = 200;
    const slice = ordered.slice(0, LIMIT);

    let html = '';
    slice.forEach(it => {
        const neto = it.pr * mult;
        html += '<div class="sheet-product">'
            + '<div class="sheet-product-top">'
            +   '<div class="sheet-product-num">N° <strong>' + highlight(it.n, qTerms) + '</strong></div>'
            + '</div>'
            + (it.c ? '<div class="sheet-product-codigo">Código Único: <strong>' + highlight(it.c, qTerms) + '</strong></div>' : '')
            + '<div class="sheet-product-desc">' + highlight(it.d, qTerms) + '</div>'
            + '<div class="sheet-product-prices">'
            +   '<div class="sheet-price-block"><span class="sheet-price-label">' + (disc > 0 ? 'Lista' : 'Precio') + '</span>'
            +     '<span class="sheet-price-' + (disc > 0 ? 'lista' : 'neto no-disc') + '">' + fmtMoney(it.pr) + '</span>'
            +   '</div>';
        if (disc > 0) {
            html += '<div class="sheet-price-block" style="align-items:flex-end"><span class="sheet-price-label">Tu precio (-' + disc + '%)</span>'
                + '<span class="sheet-price-neto">' + fmtMoney(neto) + '</span></div>';
        }
        html += '</div></div>';
    });

    if (ordered.length > LIMIT) {
        html += '<div class="sheet-empty" style="padding:14px"><div style="font-size:11px">Mostrando ' + LIMIT + ' de ' + ordered.length + ' · Refiná tu búsqueda para ver más</div></div>';
    }

    res.innerHTML = html;
    res.scrollTop = 0;
}

let sheetSearchTimer;
$('sheetSearch').addEventListener('input', e => {
    sheetState.q = e.target.value;
    clearTimeout(sheetSearchTimer);
    sheetSearchTimer = setTimeout(renderSheet, 80);
});

$('sheetDiscount').addEventListener('input', e => {
    let v = parseFloat(e.target.value) || 0;
    if (v < 0) v = 0;
    if (v > 99) v = 99;
    sheetState.discount = v;
    renderSheet();
});

$('sheetClose').addEventListener('click', () => closeSheet());
$('sheetBackdrop').addEventListener('click', () => closeSheet());

// Drag down para cerrar el sheet
(function setupSheetDrag() {
    const handle = $('sheetHandle');
    const sheet = $('sheet');
    let startY = 0;
    let currentY = 0;
    let dragging = false;

    function onStart(y) {
        if (!sheetState.open) return;
        startY = y;
        currentY = y;
        dragging = true;
        sheet.style.transition = 'none';
    }

    function onMove(y) {
        if (!dragging) return;
        currentY = y;
        const delta = Math.max(0, currentY - startY);
        sheet.style.transform = `translateY(${delta}px)`;
    }

    function onEnd() {
        if (!dragging) return;
        dragging = false;
        const delta = currentY - startY;
        sheet.style.transition = '';
        sheet.style.transform = '';
        if (delta > 80) closeSheet();
    }

    handle.addEventListener('touchstart', e => onStart(e.touches[0].clientY), { passive: true });
    handle.addEventListener('touchmove', e => onMove(e.touches[0].clientY), { passive: true });
    handle.addEventListener('touchend', onEnd);
    handle.addEventListener('touchcancel', onEnd);
})();

if (navigator.share) {
    $('shareNativeBtn').style.display = 'flex';
    $('shareNativeBtn').addEventListener('click', async () => {
        if (!currentPdf) return;
        const url = getCurrentUrl();
        try {
            await navigator.share({
                title: 'MAXIFER - ' + currentPdf.title,
                text: 'Lista de precios MAXIFER',
                url: url
            });
        } catch (err) { /* user cancelled */ }
    });
}

/* ============================================================
   HISTORY API — botón "atrás" del celular y navegador
   ============================================================ */

// Cuando el usuario va para atrás, manejamos el cambio según el estado actual
window.addEventListener('popstate', (event) => {
    const target = event.state ? event.state.view : 'home';

    // Si el sheet está abierto, cerrarlo (caso especial: se monta sobre el modal)
    if (sheetState.open) {
        closeSheet(true);
        return;
    }

    // Si el modal está abierto y vamos a una vista no-modal, cerrar modal
    const modalActive = $('modal').classList.contains('active');
    if (modalActive && target !== 'modal') {
        closeModal(true);
        // Si el target es una vista, también la activamos
        if (['home', 'consultor', 'listas'].includes(target)) {
            _suppressPush = true;
            goView(target);
            _suppressPush = false;
        }
        return;
    }

    // Cambio normal de vista
    if (['home', 'consultor', 'listas'].includes(target)) {
        _suppressPush = true;
        goView(target);
        _suppressPush = false;
    } else if (target === 'modal') {
        // Caso raro: ir adelante a modal sin contexto. Volver a home.
        _suppressPush = true;
        goView('home');
        _suppressPush = false;
    }
});

// Estado inicial: replace en lugar de push para que el primer "atrás" salga del sitio
goView('home', { replace: true });
</script>

<script id="maxifer-back-handler">
// Maxifer: el boton "atras" del browser cierra modales en lugar de salir de la app.
(function(){
  function findOpenModal(){
    var sels = [".modal-overlay.active",".modal.active",".modal-bg.active",".lightbox.active","[class*=modal-overlay].active","[class*=lightbox].active","[role=dialog]:not([hidden])"];
    for (var i=0;i<sels.length;i++){
      var els = document.querySelectorAll(sels[i]);
      for (var j=0;j<els.length;j++){
        var cs = getComputedStyle(els[j]);
        if (cs.display !== "none" && cs.visibility !== "hidden" && cs.opacity !== "0") return els[j];
      }
    }
    return null;
  }
  if (history.state && history.state.maxiferBack) return;
  history.replaceState({maxiferBack:1, base:1}, "");
  var seen = false;
  var obs = new MutationObserver(function(){
    var m = findOpenModal();
    if (m && !seen) {
      history.pushState({maxiferBack:1, modal:1}, "");
      seen = true;
    } else if (!m && seen) {
      seen = false;
    }
  });
  obs.observe(document.body, {attributes:true, attributeFilter:["class","style"], subtree:true});
  window.addEventListener("popstate", function(){
    var m = findOpenModal();
    if (m) {
      // Esc cierra la mayoria de los modales
      document.dispatchEvent(new KeyboardEvent("keydown",{key:"Escape",code:"Escape",keyCode:27,which:27,bubbles:true,cancelable:true}));
      // Si Esc no cerro, removemos active y/o ocultamos
      setTimeout(function(){
        var still = findOpenModal();
        if (still) {
          still.classList.remove("active");
          if (still.style.display === "block" || still.style.display === "flex") still.style.display = "none";
        }
        // Re-push para que el siguiente back tambien cierre modales nuevos
        if (findOpenModal()) history.pushState({maxiferBack:1, modal:1}, "");
      }, 30);
      seen = false;
    }
  });
})();
</script>
<script>

      sessionStorage.setItem("maxifer_from_menu", "1");

})();
