<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MAXIFER 3-EN-1 — Cotizador</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #f5f7fa; min-height: 100vh; }
    .app { max-width: 800px; margin: 0 auto; padding: 16px; }
    .header { background: linear-gradient(135deg,#1e3c78,#2a5298); color: white; padding: 20px 24px; border-radius: 12px; margin-bottom: 20px; }
    .header h1 { font-size: 22px; font-weight: bold; }
    .header p { margin-top: 4px; opacity: .85; font-size: 12px; }
    .card { background: white; border-radius: 12px; padding: 20px; margin-bottom: 16px; box-shadow: 0 2px 8px rgba(0,0,0,.08); }
    .card h2 { margin-bottom: 16px; font-size: 15px; color: #1e3c78; }
    .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
    label { font-size: 12px; font-weight: bold; color: #555; display: block; margin-bottom: 4px; }
    input, select, textarea { width: 100%; padding: 8px 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; font-family: inherit; }
    textarea { resize: vertical; font-family: monospace; font-size: 13px; }
    .tabs { display: flex; gap: 8px; margin-bottom: 12px; }
    .tab { padding: 6px 16px; border-radius: 20px; border: none; cursor: pointer; font-size: 13px; background: #e8edf5; color: #333; }
    .tab.active { background: #1e3c78; color: white; }
    .btn-primary { width: 100%; padding: 12px; background: #1e3c78; color: white; border: none; border-radius: 8px; font-size: 15px; font-weight: bold; cursor: pointer; margin-bottom: 16px; }
    .btn-primary:disabled { background: #aaa; cursor: not-allowed; }
    .btn-cancel { width: 100%; padding: 8px; background: none; border: 1px solid #c44; color: #c44; border-radius: 8px; font-size: 13px; cursor: pointer; margin-bottom: 16px; }
    .btn-orange { width: 100%; padding: 10px; background: #e67e22; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: bold; }
    .log { background: #e8edf5; border-radius: 8px; padding: 10px; margin-bottom: 12px; font-size: 13px; color: #1e3c78; }
    .drop-zone { border: 2px dashed #aac; border-radius: 8px; padding: 24px; text-align: center; background: #f8f9ff; margin-top: 4px; }
    .drop-zone.loaded { background: #f0f9f0; }
    .errors { background: #fff3f3; border: 1px solid #f88; border-radius: 10px; padding: 16px; margin-bottom: 16px; }
    .errors h3 { color: #c00; font-size: 14px; margin-bottom: 10px; }
    table { width: 100%; border-collapse: collapse; }
    th { padding: 5px 6px; background: #e8edf5; text-align: left; font-size: 11px; }
    td { padding: 4px 6px; font-size: 11px; border-bottom: 1px solid #eee; }
    .err-revisar { color: #c80; font-weight: bold; }
    .err-noencontrado { color: #c00; font-weight: bold; }
    .btn-exclude { margin-top: 10px; padding: 8px 16px; background: #e67; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; }
    .results-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .results-header h3 { color: #1e3c78; font-size: 14px; }
    .btn-gen { padding: 8px 20px; background: #1e3c78; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: bold; }
    .total-line { margin-top: 10px; text-align: right; font-size: 13px; }
    .downloads { margin-top: 16px; padding: 14px; background: #f0f9f0; border-radius: 8px; border: 1px solid #6c6; }
    .downloads p.title { font-weight: bold; font-size: 13px; color: #363; margin-bottom: 10px; }
    .file-block { border: 1px solid #cdc; border-radius: 6px; overflow: hidden; margin-bottom: 10px; }
    .file-title { background: #1e3c78; padding: 6px 12px; color: white; font-size: 12px; font-weight: bold; }
    .file-body { padding: 16px; text-align: center; }
    .file-body .icon { font-size: 36px; margin-bottom: 8px; }
    .file-body p { font-size: 12px; color: #555; margin-bottom: 12px; }
    .btn-download { display: block; padding: 14px 0; background: #1e3c78; color: white; border-radius: 8px; text-decoration: none; font-size: 14px; font-weight: bold; text-align: center; margin-bottom: 6px; }
    .btn-download:active { background: #162d5a; }
    .file-hint { font-size: 10px; color: #888; }
    .csv-body { padding: 12px; }
    .csv-body textarea { margin-bottom: 8px; }
    .csv-btns { display: flex; gap: 8px; }
    .btn-dlcsv { flex: 1; padding: 10px 0; background: #1e3c78; color: white; border-radius: 6px; text-decoration: none; font-size: 13px; font-weight: bold; text-align: center; display: block; }
    .btn-copycsv { flex: 1; padding: 10px 0; background: #2a6; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: bold; }
    .notice { background: #fff8e1; border: 1px solid #ffc; border-radius: 8px; padding: 10px 14px; margin-bottom: 10px; font-size: 12px; color: #775; }
    .footer { text-align: center; font-size: 11px; color: #aaa; margin-top: 20px; }
    .discount-hint { font-size: 11px; color: #888; margin-top: 2px; }
    @media (max-width: 500px) { .grid2 { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>MAXIFER 3-EN-1</h1>
    <p>Cotización PDF + Preparación PDF + CSV</p>
  </div>

  <div class="card">
    <h2>Datos del pedido</h2>
    <div class="grid2">
      <div>
        <label>Cliente *</label>
        <input id="clientName" type="text" placeholder="Nombre del cliente">
      </div>
      <div>
        <label>Vendedor</label>
        <select id="vendedor" onchange="onVendedorChange()">
          <option>Maximiliano Gordillo</option>
          <option>Micky</option>
          <option>Victor Gordillo</option>
        </select>
      </div>
    </div>
    <div style="margin-bottom:12px">
      <label>Descuento (%) — default: <span id="defaultPct">46%</span></label>
      <input id="descuento" type="number" min="0" max="100" placeholder="46" style="width:120px">
      <div class="discount-hint">Descuento efectivo: <strong id="effectivePct">46%</strong></div>
    </div>

    <div style="margin-bottom:12px">
      <label>Tipo de entrada del pedido</label>
      <div class="tabs">
        <button class="tab active" onclick="setMode('texto')">Texto</button>
        <button class="tab" onclick="setMode('imagen')">Imagen</button>
      </div>
    </div>

    <div id="panelTexto">
      <label>Pedido *</label>
      <textarea id="pedidoText" rows="8" placeholder="Ej:&#10;Regatones&#10;1, 15, 53&#10;Oring 15 = 50&#10;Seeger A 25"></textarea>
    </div>

    <div id="panelImagen" style="display:none">
      <label>Imagen del pedido</label>
      <div class="drop-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
        <span id="dropLabel" style="color:#88a;font-size:13px">Tocá aquí para elegir imagen</span>
      </div>
      <input type="file" id="fileInput" accept="image/*" style="display:none" onchange="onFileSelected(event)">
      <div id="transcribeSection" style="display:none;margin-top:10px">
        <button class="btn-orange" id="btnTranscribe" onclick="transcribeImage()">Transcribir imagen a texto</button>
      </div>
      <button id="btnQuitarImg" style="display:none;margin-top:6px;font-size:11px;background:none;border:none;color:#c44;cursor:pointer" onclick="clearImage()">Quitar imagen</button>
    </div>
  </div>

  <div id="noticeTrans" class="notice" style="display:none">
    Imagen transcripta. Revisá el texto y editalo si hace falta.
  </div>

  <button class="btn-primary" id="btnProcesar" onclick="handleSubmit()">Procesar pedido</button>
  <button class="btn-cancel" id="btnCancelar" style="display:none" onclick="cancelar()">Cancelar</button>

  <div id="logBox" class="log" style="display:none"></div>
  <div id="errorsBox" style="display:none"></div>
  <div id="resultsBox" style="display:none"></div>
  <div class="footer">MAXIFER 3-EN-1 · v2.0</div>
</div>

// ============================================================
// NORM & MATCHING
// ============================================================
function norm(str) {
  if (!str) return '';
  return str.toUpperCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
    .replace(/O['\u2019]RING/g, 'ORING')
    .replace(/[\xd7*]/g, 'X')
    .replace(/\s+/g, ' ').trim();
}

function resolveFamily(familia) {
  const n = norm(familia);
  for (const [key, val] of Object.entries(SYNONYM_MAP)) {
    if (n === norm(key)) return val;
  }
  const products = [...new Set(EXCEL_DATA.map(r => r.p))];
  const exact = products.find(p => norm(p) === n);
  if (exact) return exact;
  return null;
}

function getCandidateFamilies(familia) {
  const n = norm(familia);
  const allProducts = [...new Set(EXCEL_DATA.map(r => r.p))];
  return allProducts.filter(p => {
    const pn = norm(p);
    return pn.includes(n) || n.includes(pn) || pn.startsWith(n);
  });
}

function matchItem(familia, codigo) {
  const normCod = norm(codigo).replace(/\s/g, '').replace(/^0+/, '');
  function rowMatchesCodigo(r) {
    const rn = norm(r.n).replace(/\s/g, '').replace(/^0+/, '');
    const prefix = rn.split('-')[0].replace(/^0+/, '');
    return rn === normCod || prefix === normCod;
  }
  const exactProduct = resolveFamily(familia);
  if (exactProduct) {
    const rows = EXCEL_DATA.filter(r => r.p === exactProduct);
    const matches = rows.filter(rowMatchesCodigo);
    if (matches.length === 1) return { status: 'ok', row: matches[0] };
    if (matches.length > 1) return { status: 'ambiguous', matches };
  }
  const candidates = getCandidateFamilies(familia);
  if (candidates.length > 0) {
    const broadRows = EXCEL_DATA.filter(r => candidates.includes(r.p));
    const broadMatches = broadRows.filter(rowMatchesCodigo);
    if (broadMatches.length === 1) return { status: 'ok', row: broadMatches[0] };
    if (broadMatches.length > 1) return { status: 'ambiguous_multi', matches: broadMatches };
  }
  if (candidates.length === 0 && !exactProduct) return { status: 'no_family' };
  return { status: 'not_found' };
}

function processItems(parsedItems) {
  const results = [], errors = [];
  for (const item of parsedItems) {
    const match = matchItem(item.familia, item.codigo);
    if (match.status === 'ok') {
      const row = match.row;
      const qty = item.cantidad !== null && item.cantidad !== undefined
        ? parseInt(item.cantidad) : (parseInt(row.cm) || 0);
      results.push({ producto: row.p, numero: row.n, descripcion: row.d, cantidad: qty, precio_lista: parseFloat(row.pl), codigo_bs: row.c });
    } else if (match.status === 'ambiguous') {
      errors.push({ tipo: 'A REVISAR', texto_original: item.texto_original, motivo: 'Múltiples coincidencias para "' + item.codigo + '" en ' + item.familia });
    } else if (match.status === 'ambiguous_multi') {
      const opts = match.matches.map(r => r.p + ' (N°' + r.n + ': ' + r.d + ')').join(' | ');
      errors.push({ tipo: 'A REVISAR', texto_original: item.texto_original, motivo: 'N°' + item.codigo + ' existe en varias familias: ' + opts });
    } else if (match.status === 'no_family') {
      errors.push({ tipo: 'A REVISAR', texto_original: item.texto_original, motivo: 'No se reconoció la familia "' + item.familia + '"' });
    } else {
      errors.push({ tipo: 'NO ENCONTRADO', texto_original: item.texto_original, motivo: 'No se encontró N°' + item.codigo + ' en ' + item.familia });
    }
  }
  return { results, errors };
}

// ============================================================
// PARSE ORDER TEXT (no API needed)
// ============================================================
const ALL_PRODUCTS = [...new Set(EXCEL_DATA.map(r => r.p))];

function isFamiliaLine(line) {
  const n = norm(line);
  if (Object.keys(SYNONYM_MAP).some(k => norm(k) === n)) return true;
  if (ALL_PRODUCTS.some(p => norm(p) === n)) return true;
  if (!/\d/.test(line) && ALL_PRODUCTS.some(p => norm(p).startsWith(n) || n.startsWith(norm(p).split(' ')[0]))) return true;
  return false;
}

function resolveFamiliaName(line) {
  const n = norm(line);
  for (const [key, val] of Object.entries(SYNONYM_MAP)) { if (n === norm(key)) return val; }
  const exact = ALL_PRODUCTS.find(p => norm(p) === n);
  return exact || line;
}

function extractFamiliaAndCodigo(text, currentFamilia) {
  const words = text.split(/\s+/);
  for (let splitAt = words.length - 1; splitAt >= 1; splitAt--) {
    const potFamilia = words.slice(0, splitAt).join(' ');
    const potCodigo = words.slice(splitAt).join(' ');
    if (!potCodigo) continue;
    const nFam = norm(potFamilia);
    const famMatch =
      Object.keys(SYNONYM_MAP).some(k => norm(k) === nFam) ||
      ALL_PRODUCTS.some(p => norm(p) === nFam) ||
      ALL_PRODUCTS.some(p => norm(p).includes(nFam) && nFam.length >= 4);
    if (famMatch) return { familia: potFamilia, codigo: potCodigo };
  }
  if (currentFamilia && (/\d/.test(text) || text.length <= 12)) return { familia: currentFamilia, codigo: text };
  return null;
}

function parseOrderText(text) {
  const lines = text.split(/\n/).map(l => l.trim()).filter(Boolean);
  const items = [];
  let currentFamilia = null;
  for (const line of lines) {
    // Handle comma-separated codes on same line: "1, 15, 53"
    const withQty = line.match(/^(.+?)\s*=\s*(\d+)\s*$/);
    if (withQty) {
      const left = withQty[1].trim(), cantidad = parseInt(withQty[2]);
      const parsed = extractFamiliaAndCodigo(left, currentFamilia);
      if (parsed) { currentFamilia = parsed.familia; items.push({...parsed, cantidad, texto_original: line}); }
      continue;
    }
    // Check comma-separated codes
    if (/,/.test(line) && !/=/.test(line)) {
      const parts = line.split(',').map(p => p.trim()).filter(Boolean);
      for (const part of parts) {
        if (isFamiliaLine(part)) { currentFamilia = resolveFamiliaName(part); continue; }
        const parsed = extractFamiliaAndCodigo(part, currentFamilia);
        if (parsed) { currentFamilia = parsed.familia; items.push({...parsed, cantidad: null, texto_original: part}); }
      }
      continue;
    }
    if (isFamiliaLine(line)) { currentFamilia = resolveFamiliaName(line); continue; }
    const parsed = extractFamiliaAndCodigo(line, currentFamilia);
    if (parsed) { currentFamilia = parsed.familia; items.push({...parsed, cantidad: null, texto_original: line}); }
  }
  return items;
}

}

function cancelar() {
  state.cancelFlag = true;
  state.loading = false;
  setLog('Cancelado.');
  document.getElementById('btnProcesar').disabled = false;
  document.getElementById('btnCancelar').style.display = 'none';
}

// ============================================================
// TRANSCRIBE IMAGE
// ============================================================
async function transcribeImage() {
  if (!state.pedidoImage) return;
  const btn = document.getElementById('btnTranscribe');
  btn.disabled = true; btn.textContent = 'Transcribiendo...';
  setLog('Enviando imagen a Claude...');
  try {
    const data = await apiFetch({
      model: 'claude-haiku-4-5-20251001',
      max_tokens: 1000,
      system: 'Transcribi pedidos de productos ferreteros desde imagenes.\nUna linea por producto.\nCon cantidad: FAMILIA codigo = cantidad\nSin cantidad: FAMILIA codigo\nSolo el pedido, sin explicaciones.',
      messages: [{ role: 'user', content: [
        { type: 'image', source: { type: 'base64', media_type: state.pedidoImage.type, data: state.pedidoImage.data } },
        { type: 'text', text: 'Transcribi este pedido.' }
      ]}]
    });
    const text = (data.content || []).map(b => b.text || '').join('').trim();
    document.getElementById('pedidoText').value = text;
    setMode('texto');
    document.getElementById('noticeTrans').style.display = 'block';
    setLog('');
  } catch(err) {
    setLog('Error: ' + err.message);
  }
  btn.disabled = false; btn.textContent = 'Transcribir imagen a texto';
}

async function apiFetch(body, timeoutMs = 55000, retries = 2) {
  for (let attempt = 0; attempt <= retries; attempt++) {
    try {
      const controller = new AbortController();
      const tid = setTimeout(() => controller.abort(), timeoutMs);
      const response = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
        signal: controller.signal
      });
      clearTimeout(tid);
      if (!response.ok) { const e = await response.json().catch(()=>({})); throw new Error(e.error?.message || 'HTTP ' + response.status); }
      return response.json();
    } catch(err) {
      if (attempt < retries) { setLog('Reintentando (' + (attempt+1) + '/' + retries + ')...'); await new Promise(r=>setTimeout(r,1500)); continue; }
      throw err;
    }
  }
}

// ============================================================
// PROCESS ORDER
// ============================================================
async function handleSubmit() {
  const clientName = document.getElementById('clientName').value.trim();
  const pedidoText = document.getElementById('pedidoText').value.trim();
  if (!clientName) { alert('Ingresá el nombre del cliente.'); return; }
  if (!pedidoText) { alert('Ingresá el pedido.'); return; }

  state.loading = true; state.cancelFlag = false;
  state.result = null; state.errors = null; state.downloads = [];
  document.getElementById('btnProcesar').disabled = true;
  document.getElementById('btnCancelar').style.display = 'block';
  document.getElementById('errorsBox').style.display = 'none';
  document.getElementById('resultsBox').style.display = 'none';
  setLog('Procesando pedido...');

  const parsedItems = parseOrderText(pedidoText);
  if (parsedItems.length === 0) {
    showErrors([{ tipo: 'ERROR', motivo: 'No se pudieron extraer items. Revisá el formato.' }]);
    finishLoading(); return;
  }

  setLog('Cruzando con Excel...');
  const { results, errors } = processItems(parsedItems);
  state.result = results.length > 0 ? results : null;
  state.errors = errors.length > 0 ? errors : null;

  if (state.errors) showErrors(state.errors);
  if (state.result) showResults(state.result, clientName);
  if (!state.result && !state.errors) showErrors([{ tipo: 'ERROR', motivo: 'No se extrajeron items.' }]);

  setLog('');
  finishLoading();
}

function finishLoading() {
  state.loading = false;
  document.getElementById('btnProcesar').disabled = false;
  document.getElementById('btnCancelar').style.display = 'none';
}

// ============================================================
// RENDER ERRORS
// ============================================================
function showErrors(errors) {
  const box = document.getElementById('errorsBox');
  let rows = errors.map(e => '<tr><td class="' + (e.tipo==='A REVISAR'?'err-revisar':'err-noencontrado') + '">' + e.tipo + '</td><td>' + (e.texto_original||'-') + '</td><td>' + (e.motivo||'-') + '</td></tr>').join('');
  let excBtn = state.result ? '<button class="btn-exclude" onclick="generateFiles()">Armar igual excluyendo no encontrados</button>' : '';
  box.innerHTML = '<div class="errors"><h3>Problemas encontrados</h3><div style="overflow-x:auto"><table><thead><tr><th>Tipo</th><th>Item</th><th>Motivo</th></tr></thead><tbody>' + rows + '</tbody></table></div>' + excBtn + '</div>';
  box.style.display = 'block';
}

// ============================================================
// RENDER RESULTS
// ============================================================
function showResults(results, clientName) {
  const discount = getDiscount();
  let rows = results.map((item, i) => {
    const u = item.precio_lista * (1 - discount);
    const total = Math.round(u * item.cantidad);
    return '<tr style="background:' + (i%2===0?'#fafafa':'white') + '"><td style="font-size:10px;color:#555">' + item.producto + '</td><td style="text-align:center">' + item.numero + '</td><td>' + item.descripcion + '</td><td style="text-align:center">' + item.cantidad + '</td><td style="text-align:right;font-weight:bold">' + formatMoney(total) + '</td></tr>';
  }).join('');
  const totalGeneral = results.reduce((s, i) => s + Math.round(i.precio_lista * (1-discount) * i.cantidad), 0);
  const box = document.getElementById('resultsBox');
  box.innerHTML = '<div class="card"><div class="results-header"><h3>' + results.length + ' items procesados</h3><button class="btn-gen" onclick="generateFiles()">Generar 3 archivos</button></div><div style="overflow-x:auto"><table><thead><tr><th>Producto</th><th>N°</th><th>Descripcion</th><th>Cant.</th><th>Total</th></tr></thead><tbody>' + rows + '</tbody></table></div><div class="total-line"><strong>Total sin IVA: ' + formatMoney(totalGeneral) + '</strong></div><div id="downloadsBox"></div></div>';
  box.style.display = 'block';
}

// ============================================================
// PDF GENERATION
// ============================================================
function loadScript(src) {
  return new Promise((res, rej) => {
    if (document.querySelector('script[src="'+src+'"]')) { res(); return; }
    const s = document.createElement('script'); s.src = src;
    s.onload = res; s.onerror = rej;
    document.head.appendChild(s);
  });
}

async function generateFiles() {
  if (!state.result || state.result.length === 0) return;
  const clientName = document.getElementById('clientName').value.trim();
  const vendedor = document.getElementById('vendedor').value;
  const discount = getDiscount();
  setLog('Cargando librerías PDF...');
  await loadScript('https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js');
  await loadScript('https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js');
  setLog('Generando Cotización PDF...');
  const cotFile = await buildCotizacionPDF(state.result, clientName, vendedor, discount);
  setLog('Generando Preparación PDF...');
  const prepFile = await buildPreparacionPDF(state.result, clientName, vendedor);
  setLog('Generando CSV...');
  const csvFile = buildCSV(state.result, clientName);
  state.downloads = [cotFile, prepFile, csvFile];
  setLog('');
  renderDownloads(state.downloads);
}

function buildCSV(items, clientName) {
  const content = items.map(i => i.codigo_bs + ';' + i.cantidad).join('\n');
  const uri = 'data:text/csv;charset=utf-8,' + encodeURIComponent(content);
  return { name: slugify(clientName) + '.csv', uri, content, type: 'csv' };
}

async function buildCotizacionPDF(items, clientName, vendedor, descuento) {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();
  const phone = VENDORS[vendedor] || '11-5040-8378';
  doc.setFillColor(30,60,120); doc.rect(0,0,210,28,'F');
  doc.setTextColor(255,255,255); doc.setFontSize(16); doc.setFont('helvetica','bold');
  doc.text('MAXIFER', 14, 12);
  doc.setFontSize(8); doc.setFont('helvetica','normal');
  doc.text('Fabrica Importadora MAXIFER', 14, 18);
  doc.text('infor@fabricamaxifer.com | www.fabricamaxifer.com', 14, 23);
  doc.text('Contacto: ' + vendedor + ' - ' + phone, 14, 28);
  doc.setTextColor(0,0,0); doc.setFontSize(12); doc.setFont('helvetica','bold');
  doc.text('Cliente: ' + clientName, 14, 38);
  doc.setFontSize(9); doc.setFont('helvetica','normal');
  doc.text('Vendedor: ' + vendedor, 14, 44);
  doc.text('Descuento aplicado: ' + Math.round(descuento*100) + '%', 14, 49);
  const byProduct = {};
  for (const item of items) { if (!byProduct[item.producto]) byProduct[item.producto]=[]; byProduct[item.producto].push(item); }
  let yPos=56, totalModelos=0, totalPiezas=0, totalGeneral=0;
  for (const [producto, prodItems] of Object.entries(byProduct)) {
    doc.setFillColor(30,60,120); doc.rect(14,yPos,182,6,'F');
    doc.setTextColor(255,255,255); doc.setFontSize(9); doc.setFont('helvetica','bold');
    doc.text(producto, 16, yPos+4.5); doc.setTextColor(0,0,0); yPos+=8;
    const tableData = prodItems.map((item,idx) => {
      const u = item.precio_lista*(1-descuento), total=Math.round(u*item.cantidad);
      return [idx+1, item.numero, item.descripcion, formatMoney(u), item.cantidad, formatMoney(total)];
    });
    doc.autoTable({ startY:yPos, head:[['Item','N°','Descripcion','Unitario','Cantidad','Total']], body:tableData,
      margin:{left:14}, tableWidth:182, styles:{fontSize:7,cellPadding:1.5},
      headStyles:{fillColor:[200,220,255],textColor:[0,0,0]},
      columnStyles:{0:{cellWidth:10},1:{cellWidth:18},2:{cellWidth:80},3:{cellWidth:28},4:{cellWidth:20},5:{cellWidth:26}},
      didDrawPage:()=>{ doc.setFillColor(30,60,120); doc.rect(0,0,210,18,'F'); doc.setTextColor(255,255,255); doc.setFontSize(8); doc.text('MAXIFER | infor@fabricamaxifer.com',14,10); doc.text(vendedor+' - '+phone,14,16); doc.setTextColor(0,0,0); }
    });
    yPos = doc.lastAutoTable.finalY+2;
    const subPiezas = prodItems.reduce((s,i)=>s+i.cantidad,0);
    const subMonto = prodItems.reduce((s,i)=>s+Math.round(i.precio_lista*(1-descuento)*i.cantidad),0);
    doc.setFontSize(8); doc.setFont('helvetica','bold');
    doc.text('SUBTOTAL '+producto+': '+formatMoney(subMonto)+' | MODELOS: '+prodItems.length+' | PIEZAS: '+subPiezas, 14, yPos);
    yPos+=6; totalModelos+=prodItems.length; totalPiezas+=subPiezas; totalGeneral+=subMonto;
    if (yPos>260) { doc.addPage(); yPos=30; }
  }
  yPos+=4; doc.setDrawColor(30,60,120); doc.line(14,yPos,196,yPos); yPos+=6;
  doc.setFontSize(10); doc.setFont('helvetica','bold');
  doc.text('CANT. MODELOS: '+totalModelos+'   TOTAL PIEZAS: '+totalPiezas, 14, yPos); yPos+=7;
  doc.text('TOTAL GENERAL (sin IVA): '+formatMoney(totalGeneral), 14, yPos); yPos+=8;
  const iva=Math.round(totalGeneral*0.21), conIva=totalGeneral+iva;
  doc.setFont('helvetica','normal'); doc.setFontSize(9);
  doc.text('SUBTOTAL (sin IVA): '+formatMoney(totalGeneral), 14, yPos); yPos+=5;
  doc.text('IVA 21%: '+formatMoney(iva), 14, yPos); yPos+=5;
  doc.setFont('helvetica','bold'); doc.text('TOTAL (con IVA): '+formatMoney(conIva), 14, yPos);
  return { name: slugify(clientName)+'_Cotizacion.pdf', uri: doc.output('datauristring'), type:'pdf' };
}

async function buildPreparacionPDF(items, clientName, vendedor) {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();
  const phone = VENDORS[vendedor] || '11-5040-8378';
  doc.setFillColor(30,60,120); doc.rect(0,0,210,24,'F');
  doc.setTextColor(255,255,255); doc.setFontSize(14); doc.setFont('helvetica','bold');
  doc.text('MAXIFER - PREPARACION DE PEDIDO', 14, 12);
  doc.setFontSize(8); doc.setFont('helvetica','normal');
  doc.text('Cliente: '+clientName+'  |  Vendedor: '+vendedor+' - '+phone, 14, 20);
  doc.setTextColor(0,0,0);
  let yPos=30, itemCorrelativo=1, totalPiezas=0;
  const byProduct={};
  for (const item of items) { if (!byProduct[item.producto]) byProduct[item.producto]=[]; byProduct[item.producto].push(item); }
  for (const [producto, prodItems] of Object.entries(byProduct)) {
    doc.setFillColor(30,60,120); doc.rect(14,yPos,182,6,'F');
    doc.setTextColor(255,255,255); doc.setFontSize(9); doc.setFont('helvetica','bold');
    doc.text(producto, 16, yPos+4.5); doc.setTextColor(0,0,0); yPos+=8;
    const tableData = prodItems.map(item => { totalPiezas+=item.cantidad; return [itemCorrelativo++,item.numero,item.descripcion,item.cantidad,'','','?']; });
    doc.autoTable({ startY:yPos, head:[['#','N°','Descripcion','Cantidad','Agregado','Controlado','V']], body:tableData,
      margin:{left:14}, tableWidth:182, styles:{fontSize:7,cellPadding:1.5},
      headStyles:{fillColor:[200,220,255],textColor:[0,0,0]},
      columnStyles:{0:{cellWidth:10},1:{cellWidth:18},2:{cellWidth:80},3:{cellWidth:18},4:{cellWidth:22},5:{cellWidth:24},6:{cellWidth:10}}
    });
    yPos=doc.lastAutoTable.finalY+2;
    const piezasSection=prodItems.reduce((s,i)=>s+i.cantidad,0);
    doc.setFontSize(8); doc.setFont('helvetica','bold');
    doc.text('ITEMS: '+prodItems.length+'   PIEZAS: '+piezasSection, 14, yPos); yPos+=6;
    if (yPos>260) { doc.addPage(); yPos=10; }
  }
  yPos+=4; doc.setDrawColor(30,60,120); doc.line(14,yPos,196,yPos); yPos+=6;
  doc.setFontSize(10); doc.setFont('helvetica','bold');
  doc.text('CANT. ITEMS: '+items.length+'   TOTAL PIEZAS: '+totalPiezas, 14, yPos); yPos+=10;
  doc.setFontSize(9); doc.setFont('helvetica','normal');
  doc.text('Confeccionado por: ________________________  Firma: ____________________', 14, yPos); yPos+=8;
  doc.text('Controlado por:    ________________________  Firmado: __________________', 14, yPos);
  return { name: slugify(clientName)+'_Preparacion.pdf', uri: doc.output('datauristring'), type:'pdf' };
}

// ============================================================
// RENDER DOWNLOADS
// ============================================================
function renderDownloads(downloads) {
  const box = document.getElementById('downloadsBox');
  let html = '<div class="downloads"><p class="title">Archivos generados:</p>';
  for (const file of downloads) {
    html += '<div class="file-block"><div class="file-title">' + file.name + '</div>';
    if (file.type === 'csv') {
      const rows = Math.min(file.content.split('\n').length + 1, 6);
      html += '<div class="csv-body"><textarea readonly rows="' + rows + '" style="width:100%;padding:8px;font-family:monospace;font-size:11px;border:1px solid #cdc;border-radius:4px;resize:vertical;background:#f8fff8;margin-bottom:8px;box-sizing:border-box">' + file.content + '</textarea><div class="csv-btns"><a class="btn-dlcsv" href="' + file.uri + '" download="' + file.name + '">⬇ Descargar CSV</a><button class="btn-copycsv" onclick="copyCSV(' + JSON.stringify(file.content) + ')">📋 Copiar CSV</button></div></div>';
    } else {
      const label = file.name.includes('Cotizacion') ? '⬇ Descargar Cotización PDF' : '⬇ Descargar Preparación PDF';
      html += '<div class="file-body"><div class="icon">📄</div><p>PDF listo para descargar</p><a class="btn-download" href="' + file.uri + '" download="' + file.name + '">' + label + '</a><p class="file-hint">Si no descarga: presioná y mantené → "Descargar enlace"</p></div>';
    }
    html += '</div>';
  }
  html += '</div>';
  box.innerHTML = html;
}

function copyCSV(content) {
  if (navigator.clipboard) { navigator.clipboard.writeText(content).then(()=>alert('CSV copiado')); }
}
